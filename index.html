<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Higher — a daily car-value game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    /* Motor1.com light theme (matches the other Motor1 dailies) */
    --bg:#e9edf2; --panel:#ffffff; --panel2:#f1f5f9; --line:#dde4ec;
    --text:#13181e; --muted:#5b6672; --faint:#909aa6;
    --blue:#1f6dff; --blue-deep:#0a4fc4; --blue-tint:#eaf1ff;
    --amber:#e07b27; --amber-tint:#fbe9d8;
    --green:#12a14b; --green-tint:#e7f6ee; --red:#df3a30; --ink:#ffffff;
    --display:"Oswald",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --shadow:0 1px 2px rgba(20,33,61,.06),0 1px 3px rgba(20,33,61,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  #app{max-width:460px;margin:0 auto;padding:12px 12px 32px;min-height:100vh}
  .display{font-family:var(--display);text-transform:uppercase;letter-spacing:.02em}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .green{color:var(--green)} .red{color:var(--red)} .blue{color:var(--blue)}
  button{font-family:var(--sans);cursor:pointer;border:0;color:inherit;background:none}
  button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--blue);outline-offset:2px}

  /* topbar */
  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding:4px 2px 12px;border-bottom:1px solid var(--line);margin-bottom:12px}
  .m1{display:inline-flex;align-items:center;gap:1px;text-decoration:none;color:var(--text);
    font-family:var(--sans);font-weight:800;font-size:23px;letter-spacing:-.02em;line-height:1}
  .m1 svg{width:25px;height:25px;display:block;margin:0 0 1px 0}
  .m1 .com{font-size:13px;font-weight:700;align-self:flex-end;margin-bottom:3px;letter-spacing:0}
  .gamechip{text-align:right;line-height:1}
  .gamechip .gn{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:.06em;color:var(--text)}
  .gamechip .gd{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-top:2px}

  /* progress + streak bar */
  .hud{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .pips{display:flex;gap:4px;flex-wrap:wrap;flex:1}
  .pip{width:14px;height:6px;border-radius:3px;background:var(--line)}
  .pip.win{background:var(--green)} .pip.miss{background:var(--red)} .pip.now{background:var(--blue)}
  .streakchip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:12px;font-weight:600;
    color:var(--blue-deep);background:var(--blue-tint);border:1px solid #cfe0ff;border-radius:20px;padding:4px 11px;flex:none}
  .streakchip.hot{color:#b3460a;background:#fdeede;border-color:#f3cda3}

  /* prompt */
  .prompt{text-align:center;margin:2px 0 12px}
  .prompt .q{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:.01em}
  .prompt .sub{font-size:12.5px;color:var(--muted);margin-top:2px}

  /* the two cars */
  .ring{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:stretch;position:relative}
  .vs{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3;
    width:34px;height:34px;border-radius:50%;background:var(--text);color:#fff;font-family:var(--display);font-weight:700;
    font-size:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(20,33,61,.25)}
  .car{background:var(--panel);border:1px solid var(--line);border-top:4px solid var(--side,var(--blue));border-radius:12px;
    padding:13px 12px 14px;box-shadow:var(--shadow);text-align:left;display:flex;flex-direction:column;min-height:150px;width:100%;
    transition:transform .12s ease, box-shadow .12s ease}
  .car.tap{cursor:pointer}
  .car.tap:active{transform:scale(.98)}
  .car .yr{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.04em}
  .car .mk{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--side,var(--blue));text-transform:uppercase;letter-spacing:.08em;margin-top:5px}
  .car .md{font-family:var(--display);font-weight:600;font-size:19px;line-height:1.08;margin-top:3px;letter-spacing:.005em}
  .car .badge{margin-top:auto;align-self:flex-start;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.03em;
    color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:3px 7px;margin-top:12px}
  .car .taphint{margin-top:11px;font-family:var(--display);font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--side,var(--blue));text-align:center;border-top:1px dashed var(--line);padding-top:9px}
  .car.left{--side:var(--blue)} .car.right{--side:var(--amber)}

  /* reveal state */
  .car .rating{font-family:var(--mono);font-weight:600;font-size:30px;line-height:1;margin-top:10px}
  .car .rk{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-top:9px}
  .car.win{border-color:var(--green);box-shadow:0 0 0 2px var(--green) inset, 0 6px 18px rgba(18,161,75,.18)}
  .car.win .rating{color:var(--green)}
  .car.lose{opacity:.55}
  .car .crown{align-self:flex-start;font-family:var(--display);font-weight:700;font-size:11px;letter-spacing:.08em;
    color:#fff;background:var(--green);border-radius:5px;padding:2px 8px;margin-top:10px}
  .car .est{font-family:var(--mono);font-size:9px;color:var(--faint);margin-left:5px}

  /* breakdown bars */
  .breakdown{margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px 13px;box-shadow:var(--shadow)}
  .breakdown .bh{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);
    display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .leg{display:inline-flex;gap:10px}
  .leg span{display:inline-flex;align-items:center;gap:4px;font-size:9.5px}
  .leg i{width:9px;height:9px;border-radius:2px;display:inline-block}
  .leg .la{background:var(--blue)} .leg .lb{background:var(--amber)}
  .drow{margin-bottom:9px}
  .drow:last-child{margin-bottom:0}
  .drow .dl{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  .bar{display:flex;align-items:center;gap:7px;margin-bottom:3px}
  .bar .track{flex:1;height:8px;background:var(--panel2);border-radius:5px;overflow:hidden}
  .bar .fill{height:100%;width:0;border-radius:5px;transition:width .6s cubic-bezier(.2,.7,.2,1)}
  .bar.a .fill{background:var(--blue)} .bar.b .fill{background:var(--amber)}
  .bar .bv{font-family:var(--mono);font-size:10.5px;font-weight:600;width:24px;text-align:right;color:var(--muted)}
  .bar.hi .bv{color:var(--text)} .bar.hi .fill{filter:saturate(1.15)}

  /* verdict */
  .verdict{margin-top:13px;text-align:center;border-radius:12px;padding:13px 12px;border:1px solid var(--line);box-shadow:var(--shadow)}
  .verdict.right{background:var(--green-tint);border-color:#b6e2c8}
  .verdict.wrong{background:#fdecea;border-color:#f3c3bd}
  .verdict .vt{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:.02em}
  .verdict.right .vt{color:#0c6b34} .verdict.wrong .vt{color:#a52218}
  .verdict .note{font-size:13px;color:var(--text);line-height:1.4;margin-top:4px}
  .verdict .note b{font-weight:700}

  /* buttons */
  .btn{display:block;width:100%;text-align:center;border-radius:10px;padding:14px;margin-top:12px;
    font-family:var(--display);font-weight:600;font-size:16px;letter-spacing:.03em;text-transform:uppercase}
  .btn.primary{background:var(--blue);color:var(--ink);box-shadow:0 2px 8px rgba(31,109,255,.32)}
  .btn.primary:active{filter:brightness(.94)}
  .btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--text);font-size:13px;padding:12px;box-shadow:var(--shadow)}

  /* intro */
  .intro{padding:14px 4px 4px}
  .intro .big{font-family:var(--display);font-weight:700;font-size:38px;line-height:1.02;letter-spacing:.005em;text-wrap:balance}
  .intro .big .hl{color:var(--blue)}
  .intro .lede{font-size:14px;color:var(--muted);line-height:1.5;margin:13px 0 4px;max-width:42ch}
  .how{display:flex;flex-direction:column;gap:9px;margin:18px 0 6px;border-top:1px solid var(--line);padding-top:16px}
  .how .h{display:flex;gap:11px;align-items:flex-start}
  .how .n{flex:none;width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-family:var(--mono);font-weight:600;
    font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .how .t{font-size:13px;color:var(--text);line-height:1.42}
  .how .t b{font-weight:700;color:var(--text)}
  .statline{display:flex;gap:8px;margin:14px 0 2px}
  .statbox{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 8px;text-align:center;box-shadow:var(--shadow)}
  .statbox .k{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .statbox .v{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:3px;color:var(--blue-deep)}
  .donebanner{display:flex;align-items:center;gap:10px;background:var(--green-tint);border:1px solid #b6e2c8;border-radius:9px;
    padding:10px 12px;margin:0 0 12px;font-size:12.5px;color:#0c6b34;line-height:1.35}
  .donebanner b{font-weight:700}
  .foot{margin-top:18px;text-align:center;font-size:11px;color:var(--faint);line-height:1.5}

  /* end / share */
  .endhead{text-align:center;padding:8px 0 2px}
  .endhead .k{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  .endhead .score{font-family:var(--mono);font-weight:600;font-size:52px;line-height:1;margin-top:4px;color:var(--blue)}
  .endhead .ssub{font-size:13px;color:var(--muted);margin-top:4px}
  .endhead .verdictline{font-family:var(--display);font-weight:600;font-size:18px;margin-top:8px;letter-spacing:.01em}
  .endstats{display:flex;gap:8px;margin-top:14px}
  .reviewlist{margin-top:14px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow)}
  .rev{display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid var(--line);font-size:12.5px}
  .rev:last-child{border-bottom:0}
  .rev .ri{flex:none;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
  .rev .ri.w{background:var(--green)} .rev .ri.m{background:var(--red)}
  .rev .rc{flex:1;line-height:1.3}
  .rev .rc b{font-weight:600}
  .rev .rg{font-family:var(--mono);font-size:11px;color:var(--faint);flex:none}
  .share{margin-top:14px;background:var(--blue-tint);border:1px dashed #b9d2ff;border-radius:10px;padding:12px 13px;
    font-family:var(--mono);font-size:12.5px;white-space:pre-wrap;line-height:1.55;color:var(--text)}

  /* motion */
  @keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.06);opacity:1}100%{transform:scale(1)}}
  @keyframes flashwin{0%{box-shadow:0 0 0 2px var(--green) inset,0 0 0 6px rgba(18,161,75,.35)}100%{box-shadow:0 0 0 2px var(--green) inset,0 6px 18px rgba(18,161,75,.18)}}
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .anim-up{animation:up .28s cubic-bezier(.2,.7,.2,1) both}
  .anim-pop{animation:pop .34s cubic-bezier(.2,.7,.2,1) both}
  .car.win.flash{animation:flashwin .6s ease-out}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

// Editorial-tunable weights (sum ~1). Value-led because value is the real signal.
var WEIGHTS = { value:0.40, performance:0.20, desirability:0.25, rarity:0.15 };
var DIMS = [
  { key:"sv", w:"value",        label:"Value" },
  { key:"sp", w:"performance",  label:"Performance" },
  { key:"sd", w:"desirability", label:"Desirability" },
  { key:"sr", w:"rarity",       label:"Rarity" },
];
var N_MATCHUPS = 12;
var SHARE_URL = "higher.motor1.com";

/* ---------------- rating (read from data through WEIGHTS) ---------------- */
function ratingOf(c){
  if(c._r!=null) return c._r;
  var r = WEIGHTS.value*c.sv + WEIGHTS.performance*c.sp + WEIGHTS.desirability*c.sd + WEIGHTS.rarity*c.sr;
  c._r = r; return r;
}
function fmtR(r){ return r.toFixed(1); }

/* ---------------- helpers ---------------- */
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function hashString(str){ var h=2166136261>>>0; for(var i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);} return h>>>0; }
function mulberry32(seed){ var a=seed>>>0; return function(){ a|=0;a=(a+0x6d2b79f5)|0; var t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
function pad2(n){ return n<10?"0"+n:""+n; }
function todaySeed(){ var d=new Date(); return ""+d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate()); }
function dailyNumber(){ var d=new Date(); var now=Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()); return Math.floor((now-Date.UTC(2026,0,1))/86400000)+1; }
function prefersReducedMotion(){ return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; }

/* ---------------- the daily matchup sequence (seeded, paced) ----------------
   A deliberate dopamine curve: a couple of easy confidence-builders first,
   then mostly close calls, with one mid-run gimme. We chase a gap-target
   sequence and pick the nearest available pair to each target. Same seed ->
   same cars in the same order on every device. */
var GAP_TARGETS = [16, 11, 7, 4, 3, 2, 13, 3, 2, 5, 2, 1.5];
function buildSequence(seed){
  var rng = mulberry32(hashString("higher|"+seed));
  var pool = CARS.map(function(c,i){ return { c:c, i:i, r:ratingOf(c) }; }).sort(function(a,b){ return a.r-b.r; });
  var targets = GAP_TARGETS.map(function(t){ return Math.max(1, t + (rng()*3-1.5)); });
  var used = new Array(pool.length); var seq=[];
  targets.forEach(function(t){
    var best=null, bestDelta=Infinity, ties=[];
    for(var x=0;x<pool.length;x++){
      if(used[x]) continue;
      for(var y=x+1;y<pool.length;y++){
        if(used[y]) continue;
        var gap = pool[y].r - pool[x].r;       // sorted asc -> gap>=0
        if(gap < 1) continue;                   // need a clear higher car (no coin-flips)
        var delta = Math.abs(gap - t);
        if(delta < bestDelta - 1e-9){ bestDelta=delta; ties=[[x,y]]; }
        else if(delta < bestDelta + 0.25){ ties.push([x,y]); }
      }
    }
    if(!ties.length) return;
    best = ties[Math.floor(rng()*ties.length)];  // seeded variety among near-equal pairs
    used[best[0]]=true; used[best[1]]=true;
    var lo=pool[best[0]], hi=pool[best[1]];
    var flip = rng()<0.5;                          // randomize which side the higher car sits on
    seq.push({ a: flip?hi:lo, b: flip?lo:hi });
  });
  return seq;
}

/* ---------------- reveal note (computed, never faked) ---------------- */
function decidingDim(win, lose){
  // the dimension where the winner most out-earned the loser (weighted contribution)
  var best=DIMS[0], bestC=-Infinity;
  DIMS.forEach(function(d){ var c=(win[d.key]-lose[d.key])*WEIGHTS[d.w]; if(c>bestC){bestC=c;best=d;} });
  return best;
}
function revealNote(aw, bw){
  var win = ratingOf(aw)>=ratingOf(bw)?aw:bw, lose = win===aw?bw:aw;
  var gap = Math.abs(ratingOf(aw)-ratingOf(bw));
  var d = decidingDim(win, lose);
  var who = win.md;
  if(gap < 1.0) return "Razor thin — "+fmtR(gap)+" apart. The "+who+" edged it on "+d.label.toLowerCase()+".";
  if(gap < 3.0) return "Close one — "+fmtR(gap)+" apart. The "+who+" took it on "+d.label.toLowerCase()+".";
  if(gap > 14)  return "Not close — the "+who+" runs away with it.";
  return "The "+who+" took it on "+d.label.toLowerCase()+".";
}

/* ---------------- localStorage (casual integrity; never hard-blocks replay) ---------------- */
function lsGet(k){ try{ return window.localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ window.localStorage.setItem(k,v); }catch(e){} }

/* ---------------- DOM helper ---------------- */
function el(tag,props,kids){
  props=props||{}; var n=document.createElement(tag);
  for(var k in props){ var v=props[k];
    if(v==null||v===false) continue;
    if(k==="class") n.className=v;
    else if(k==="html") n.innerHTML=v;
    else if(k==="text") n.textContent=v;
    else if(k.indexOf("on")===0 && typeof v==="function") n.addEventListener(k.slice(2).toLowerCase(),v);
    else n.setAttribute(k,v);
  }
  kids = kids==null?[]:(Array.isArray(kids)?kids:[kids]);
  kids.forEach(function(c){ if(c==null||c===false) return; n.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return n;
}
function reduced(){ return prefersReducedMotion(); }
function animateCount(node, from, to, ms, fmt){
  fmt = fmt || function(v){ return String(Math.round(v)); };
  if(!node) return;
  if(reduced() || ms<=0 || from===to){ node.textContent=fmt(to); return; }
  var t0=null, done=false;
  function finish(){ if(done) return; done=true; node.textContent=fmt(to); }
  function step(ts){ if(done) return; if(t0===null) t0=ts; var t=Math.min(1,(ts-t0)/ms), e=1-Math.pow(1-t,3);
    node.textContent=fmt(from+(to-from)*e); if(t<1) requestAnimationFrame(step); else finish(); }
  requestAnimationFrame(step); setTimeout(finish, ms+80);
}

  root.appendChild(view);
  if(fresh && s.phase!=="play"&&s.phase!=="reveal"){ [].forEach.call(view.children,function(c,i){ c.classList.add("anim-up"); c.style.animationDelay=(i*45)+"ms"; }); }
  App.fresh=false;
}

/* ---------------- a round (play + reveal share one view) ---------------- */
function streakChip(){
  var s=App.state, hot=s.streak>=3;
  var label = s.streak>0 ? (hot?"🔥 ":"")+s.streak+" streak" : "no streak";

function pips(){

  for(var i=0;i<N_MATCHUPS;i++){
    var cls="pip";
    if(i<s.results.length) cls += s.results[i].correct?" win":" miss";

function carCard(side, m, role){
  // role: "tap" (play) or "reveal"
  var c = side==="left"? m.a.c : m.b.c;
  var isWin=null;
  if(role==="reveal"){ var aw=ratingOf(m.a.c), bw=ratingOf(m.b.c); var thisR=ratingOf(c); var otherR= side==="left"?bw:aw; isWin = thisR>otherR; }
  var cls="car "+side+(role==="tap"?" tap":"")+(role==="reveal"?(isWin?" win":" lose"):"");
  var kids=[
    el("div",{class:"yr",text:c.yr}),
    el("div",{class:"mk",text:c.mk}),
    el("div",{class:"md",text:c.md}),
    el("div",{class:"badge",text:c.cat}),
  ];
  if(role==="tap"){
    kids.push(el("div",{class:"taphint",text:"Tap if higher"}));
  } else {
    var rn=el("div",{class:"rating num",text:fmtR(0)});
    kids.push(el("div",{class:"rk"},[ "Rating", c.approx?el("span",{class:"est",text:"est."}):null ]));
    kids.push(rn);
    if(isWin) kids.push(el("div",{class:"crown",text:"HIGHER ✓"}));
    m["_rn_"+side]=rn;
  }
  var node=el("div",{class:cls, role: role==="tap"?"button":null, tabindex: role==="tap"?"0":null});
  kids.forEach(function(k){ if(k) node.appendChild(k); });
  if(role==="tap"){
    var pick=function(){ choose(side); };
    node.addEventListener("click", pick);
    node.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); pick(); } });
  }
  return node;
}
function roundView(){
  var s=App.state, m=s.seq[s.idx], role = s.revealed?"reveal":"tap";
  var wrap=el("div",{},[]);
  wrap.appendChild(el("div",{class:"hud"},[ pips(), streakChip() ]));
  wrap.appendChild(el("div",{class:"prompt"},[
    el("div",{class:"q",text: s.revealed?"The reveal":"Which is worth more?"}),
    el("div",{class:"sub",text:"Matchup "+(s.idx+1)+" of "+N_MATCHUPS}),
  ]));
  var ring=el("div",{class:"ring"},[ carCard("left",m,role), carCard("right",m,role), el("div",{class:"vs",text:"VS"}) ]);
  wrap.appendChild(ring);

  if(!s.revealed) return wrap;

  // --- reveal: count up ratings, breakdown bars, verdict ---
  var ra=ratingOf(m.a.c), rb=ratingOf(m.b.c);
  animateCount(m._rn_left,  0, ra, 650, fmtR);
  animateCount(m._rn_right, 0, rb, 650, fmtR);
  if(!reduced()){ var winCard=ring.querySelector(".car.win"); if(winCard) winCard.classList.add("flash"); }

  wrap.appendChild(breakdownPanel(m));

  var correct = s.results[s.idx].correct;
  wrap.appendChild(el("div",{class:"verdict "+(correct?"right":"wrong")},[
    el("div",{class:"vt"+(reduced()?"":" anim-pop"),text: correct?"Correct":"Nope"}),
    el("div",{class:"note",html: revealNote(m.a.c, m.b.c) }),
  ]));
  var last = s.idx>=N_MATCHUPS-1;
  wrap.appendChild(el("button",{class:"btn primary",text: last?"See your results ▸":"Next matchup ▸",onclick:function(){ next(); }}));
  return wrap;
}
function breakdownPanel(m){
  var panel=el("div",{class:"breakdown"},[
    el("div",{class:"bh"},[ el("span",{text:"The breakdown"}),
      el("span",{class:"leg"},[ el("span",{},[ el("i",{class:"la"}), m.a.c.md.length>10?m.a.c.md.slice(0,10)+"…":m.a.c.md ]),
        el("span",{},[ el("i",{class:"lb"}), m.b.c.md.length>10?m.b.c.md.slice(0,10)+"…":m.b.c.md ]) ]) ]),
  ]);
  var fills=[];
  DIMS.forEach(function(d){
    var av=m.a.c[d.key], bv=m.b.c[d.key];
    var fa=el("div",{class:"fill"}), fb=el("div",{class:"fill"});
    fills.push([fa,av],[fb,bv]);
    panel.appendChild(el("div",{class:"drow"},[
      el("div",{class:"dl",text:d.label}),
      el("div",{class:"bar a"+(av>=bv?" hi":"")},[ el("div",{class:"track"},[fa]), el("span",{class:"bv",text:String(av)}) ]),
      el("div",{class:"bar b"+(bv>av?" hi":"")},[ el("div",{class:"track"},[fb]), el("span",{class:"bv",text:String(bv)}) ]),
    ]));
  });
  // animate the bar fills in (width tween); reduced-motion sets final width immediately
  if(reduced()){ fills.forEach(function(f){ f[0].style.width=f[1]+"%"; }); }
  else { requestAnimationFrame(function(){ requestAnimationFrame(function(){ fills.forEach(function(f){ f[0].style.width=f[1]+"%"; }); }); }); }
  return panel;
}

function choose(side){
  var s=App.state; if(s.revealed) return;
  var m=s.seq[s.idx];
  var ra=ratingOf(m.a.c), rb=ratingOf(m.b.c);
  var pickedHigher = side==="left" ? (ra>=rb) : (rb>=ra);
  s.picked=side; s.revealed=true;
  s.results[s.idx] = { correct:pickedHigher };
  if(pickedHigher){ s.streak++; if(s.streak>s.best) s.best=s.streak; }
  else { s.streak=0; }
  s.phase="reveal";
  render(); window.scrollTo(0,0);
}
function next(){
  var s=App.state;
  if(s.idx>=N_MATCHUPS-1){ finish(); return; }
  s.idx++; s.revealed=false; s.picked=null; s.phase="play";
  render(); window.scrollTo(0,0);
}
function finish(){
  var s=App.state;
  if(!s.practice){
    var score=s.results.filter(function(r){return r.correct;}).length;
    if(!loadDaily(s.daily)) saveDaily(s.daily, { score:score, best:s.best, strip: s.results.map(function(r){return r.correct?1:0;}) });
    var st=loadStats();
    if(st.lastDay!==s.daily){ st.played=(st.played||0)+1; st.lastDay=s.daily; }
    if(s.best>(st.best||0)) st.best=s.best;
    saveStats(st);
  }
  s.phase="end"; App.fresh=true; render(); window.scrollTo(0,0);
}

function scoreVerdict(score){
  var p=score/N_MATCHUPS;
  if(p>=0.92) return "Collector-grade. You know your metal.";
  if(p>=0.75) return "Sharp eye.";
  if(p>=0.5)  return "Respectable. The close ones are the skill.";
  if(p>=0.25) return "The market humbles everyone.";
  return "Rough day at auction.";
}
function endView(){
  var s=App.state;
  var score=s.results.filter(function(r){return r.correct;}).length;
  var stats=loadStats();
  var wrap=el("div",{class:"end"},[]);
  wrap.appendChild(el("div",{class:"endhead"},[
    el("div",{class:"k",text:(s.practice?"Practice run":"Daily #"+s.daily)+" · complete"}),
    el("div",{class:"score num",text:score+"/"+N_MATCHUPS}),
    el("div",{class:"ssub",text:"Best streak this run: "+s.best}),
    el("div",{class:"verdictline",text:scoreVerdict(score)}),
  ]));
  wrap.appendChild(el("div",{class:"endstats"},[
    statBox("This run", score+"/"+N_MATCHUPS),
    statBox("Run streak", s.best),
    statBox("All-time best", Math.max(stats.best||0, s.best)),
  ]));

  // per-matchup review
  var list=el("div",{class:"reviewlist"});
  s.seq.forEach(function(m,i){
    var r=s.results[i]; if(!r) return;
    var win = ratingOf(m.a.c)>=ratingOf(m.b.c)?m.a.c:m.b.c;
    var gap = Math.abs(ratingOf(m.a.c)-ratingOf(m.b.c));
    list.appendChild(el("div",{class:"rev"},[
      el("div",{class:"ri "+(r.correct?"w":"m"),text:r.correct?"✓":"✕"}),
      el("div",{class:"rc"},[ el("b",{text:win.md}), " over "+(win===m.a.c?m.b.c.md:m.a.c.md) ]),
      el("div",{class:"rg",text:fmtR(gap)}),
    ]));
  });
  wrap.appendChild(list);

  // share card
  var strip = s.results.map(function(r){ return r.correct?"🟩":"⬜"; }).join("");
  var line1 = "🏁 HIGHER #"+s.daily+" — "+score+"/"+N_MATCHUPS;
  var line2 = "🔥 Best streak: "+s.best;
  var shareText = line1+"\n"+line2+"\n"+strip+"\n"+SHARE_URL;
  wrap.appendChild(el("div",{class:"share",text:shareText}));
  wrap.appendChild(el("button",{class:"btn primary",text:"Copy result",onclick:function(ev){ copyShare(shareText, ev.currentTarget); }}));
  wrap.appendChild(el("button",{class:"btn ghost",text:"Practice run (random cars)",onclick:function(){ setPractice(); start(); }}));
  return wrap;
}
function copyShare(text, btn){
  var full = text.indexOf(SHARE_URL)>=0 ? text.replace(SHARE_URL, location.href) : (text+"\n"+location.href);
  var done=function(){ var t=btn.textContent; btn.textContent="Copied ✓"; setTimeout(function(){ btn.textContent=t; },1400); };
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(full).then(done,done);
  else done();
}

/* ---------------- boot ---------------- */
App.root=document.getElementById("app");
setDaily();
App.fresh=true;
render();
window.__HIGHER__ = { CARS:CARS, WEIGHTS:WEIGHTS, ratingOf:ratingOf, buildSequence:buildSequence, dailyNumber:dailyNumber };
})();
</script>
