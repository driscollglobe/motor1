<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>HIGHER — the Motor1 car game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#e9edf2; --panel:#ffffff; --panel2:#f1f5f9; --line:#dde4ec;
    --text:#13181e; --muted:#5b6672; --faint:#909aa6;
    --blue:#1f6dff; --blue-deep:#0a4fc4; --blue-tint:#eaf1ff;
    --amber:#e07b27; --amber-tint:#fbe9d8;
    --green:#12a14b; --green-tint:#e7f6ee; --red:#df3a30; --ink:#ffffff;
    --display:"Oswald",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --shadow:0 1px 2px rgba(20,33,61,.06),0 1px 3px rgba(20,33,61,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  #app{max-width:460px;margin:0 auto;padding:12px 12px 32px;min-height:100vh}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .green{color:var(--green)} .red{color:var(--red)} .blue{color:var(--blue)}
  button{font-family:var(--sans);cursor:pointer;border:0;color:inherit;background:none}
  button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--blue);outline-offset:2px}

  /* topbar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 12px;border-bottom:1px solid var(--line);margin-bottom:12px}
  .m1{display:inline-flex;align-items:center;gap:1px;text-decoration:none;color:var(--text);font-family:var(--sans);font-weight:800;font-size:23px;letter-spacing:-.02em;line-height:1}
  .m1 svg{width:25px;height:25px;display:block;margin:0 0 1px 0}
  .m1 .com{font-size:13px;font-weight:700;align-self:flex-end;margin-bottom:3px;letter-spacing:0}
  .topright{display:flex;align-items:center;gap:10px}
  .gamechip{text-align:right;line-height:1}
  .gamechip .gn{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:.06em;color:var(--text)}
  .gamechip .gd{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-top:2px}
  .infobtn{flex:none;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);background:var(--panel);color:var(--muted);font-family:var(--display);font-weight:700;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center}
  .infobtn:hover{border-color:var(--blue);color:var(--blue)}

  /* hud + timer */
  .hud{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .pips{display:flex;gap:5px;flex-wrap:wrap;flex:1}
  .pip{width:22px;height:7px;border-radius:3px;background:var(--line)}
  .pip.win{background:var(--green)} .pip.miss{background:var(--red)} .pip.now{background:var(--blue)}
  .timerchip{display:inline-flex;align-items:center;justify-content:center;min-width:70px;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue-deep);background:var(--blue-tint);border:1px solid #cfe0ff;border-radius:20px;padding:4px 11px;flex:none}
  .timerchip.warn{color:#b3460a;background:#fdeede;border-color:#f3cda3}
  .timerchip.crit{color:#a52218;background:#fdecea;border-color:#f3c3bd}
  .timebar{height:6px;border-radius:3px;background:var(--line);overflow:hidden;margin:0 0 12px}
  .timebar .tfill{height:100%;width:100%;background:var(--blue)}
  .timebar.warn .tfill{background:var(--amber)}
  .timebar.crit .tfill{background:var(--red)}

  /* prompt */
  .prompt{text-align:center;margin:2px 0 12px}
  .prompt .q{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:.01em;line-height:1.1}
  .prompt .q .hl{color:var(--blue)}
  .prompt .sub{font-size:12px;color:var(--muted);margin-top:3px}

  /* cars */
  .ring{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:stretch;position:relative}
  .vs{position:absolute;left:50%;top:54px;transform:translate(-50%,-50%);z-index:3;width:34px;height:34px;border-radius:50%;background:var(--text);color:#fff;font-family:var(--display);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(20,33,61,.25)}
  .car{background:var(--panel);border:1px solid var(--line);border-top:4px solid var(--side,var(--blue));border-radius:12px;padding:13px 12px 14px;box-shadow:var(--shadow);text-align:left;display:flex;flex-direction:column;min-height:150px;width:100%;transition:transform .12s ease, box-shadow .12s ease}
  .car.tap{cursor:pointer} .car.tap:active{transform:scale(.98)}
  .car.left{--side:var(--blue)} .car.right{--side:var(--amber)}
  .car .yr{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.04em}
  .car .mk{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--side,var(--blue));text-transform:uppercase;letter-spacing:.08em;margin-top:5px}
  .car .md{font-family:var(--display);font-weight:600;font-size:18px;line-height:1.08;margin-top:3px;letter-spacing:.005em}
  .car .badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
  .car .badge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.03em;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:3px 7px}
  .car .badge.anchor{color:var(--blue-deep);background:var(--blue-tint);border-color:#cfe0ff}
  .car .taphint{margin-top:auto;font-family:var(--display);font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--side,var(--blue));text-align:center;border-top:1px dashed var(--line);padding-top:9px;margin-top:12px}
  /* reveal additions */
  .car .statk{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-top:11px}
  .car .statv{display:inline-block;font-family:var(--mono);font-weight:600;font-size:22px;line-height:1.15;margin-top:4px;padding:0 0 1px;text-align:left;color:inherit;border-bottom:1px dotted var(--blue);align-self:flex-start}
  .car.win .statv{color:var(--green)}
  .car .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
  .tag{font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:.07em;border-radius:5px;padding:2px 7px}
  .tag.pick{color:var(--blue-deep);background:var(--blue-tint);border:1px solid #cfe0ff}
  .tag.win{color:#fff;background:var(--green)}
  .car .srchint{margin-top:auto;font-family:var(--mono);font-size:10px;color:var(--blue);text-align:center;border-top:1px dashed var(--line);padding-top:8px;margin-top:11px}
  .car.win{border-color:var(--green);box-shadow:0 0 0 2px var(--green) inset, 0 6px 18px rgba(18,161,75,.16)}
  .car.lose{opacity:.62}

  /* pain marker */
  .pain{margin-top:12px;text-align:center;border-radius:10px;padding:10px 12px;font-size:13.5px;line-height:1.35;border:1px solid var(--line);box-shadow:var(--shadow)}
  .pain.good{background:var(--green-tint);border-color:#b6e2c8;color:#0c6b34}
  .pain.bad{background:#fdecea;border-color:#f3c3bd;color:#a52218}
  .pain b{font-weight:700}

  /* editorial note */
  .note{margin-top:11px;background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--amber);border-radius:10px;padding:11px 13px;font-size:13.5px;line-height:1.4;box-shadow:var(--shadow)}
  .note .nk{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--amber);margin-bottom:3px}
  .note b{font-weight:700}

  /* buttons */
  .btn{display:block;width:100%;text-align:center;border-radius:10px;padding:14px;margin-top:12px;font-family:var(--display);font-weight:600;font-size:16px;letter-spacing:.03em;text-transform:uppercase}
  .btn.primary{background:var(--blue);color:var(--ink);box-shadow:0 2px 8px rgba(31,109,255,.32)} .btn.primary:active{filter:brightness(.94)}
  .btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--text);font-size:13px;padding:12px;box-shadow:var(--shadow)}

  /* intro */
  .intro{padding:14px 4px 4px}
  .intro .big{font-family:var(--display);font-weight:700;font-size:34px;line-height:1.05;letter-spacing:.005em;text-wrap:balance}
  .intro .big .hl{color:var(--blue)}
  .intro .lede{font-size:14px;color:var(--muted);line-height:1.5;margin:12px 0 4px;max-width:42ch}
  .intro .lede a{color:var(--blue);font-weight:600;text-decoration:none;border-bottom:1px dotted var(--blue)}
  .anchork{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin:16px 0 7px}
  .how{display:flex;flex-direction:column;gap:9px;margin:18px 0 6px;border-top:1px solid var(--line);padding-top:16px}
  .how .h{display:flex;gap:11px;align-items:flex-start}
  .how .n{flex:none;width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-family:var(--mono);font-weight:600;font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .how .t{font-size:13px;color:var(--text);line-height:1.42}
  .statline{display:flex;gap:8px;margin:14px 0 2px}
  .statbox{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 8px;text-align:center;box-shadow:var(--shadow)}
  .statbox .k{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .statbox .v{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:3px;color:var(--blue-deep)}
  .donebanner{display:flex;align-items:center;gap:10px;background:var(--green-tint);border:1px solid #b6e2c8;border-radius:9px;padding:10px 12px;margin:0 0 12px;font-size:12.5px;color:#0c6b34;line-height:1.35}
  .donebanner b{font-weight:700}
  .foot{margin-top:18px;text-align:center;font-size:11px;color:var(--faint);line-height:1.5}

  /* end */
  .endhead{text-align:center;padding:8px 0 2px}
  .endhead .k{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  .endhead .score{font-family:var(--mono);font-weight:600;font-size:52px;line-height:1;margin-top:4px;color:var(--blue)}
  .endhead .ssub{font-size:13px;color:var(--muted);margin-top:4px}
  .endstats{display:flex;gap:8px;margin-top:14px}
  .reviewlist{margin-top:14px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow)}
  .rev{display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid var(--line);font-size:12.5px} .rev:last-child{border-bottom:0}
  .rev .ri{flex:none;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
  .rev .ri.w{background:var(--green)} .rev .ri.m{background:var(--red)}
  .rev .rc{flex:1;line-height:1.3} .rev .rc b{font-weight:600}
  .rev .rg{font-family:var(--mono);font-size:11px;color:var(--faint);flex:none}
  .share{margin-top:14px;background:var(--blue-tint);border:1px dashed #b9d2ff;border-radius:10px;padding:12px 13px;font-family:var(--mono);font-size:12.5px;white-space:pre-wrap;line-height:1.55;color:var(--text)}
  .version{margin-top:14px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--faint)}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(20,33,61,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .modal{background:var(--panel);border-radius:16px 16px 0 0;width:100%;max-width:460px;max-height:88vh;overflow:auto;padding:16px 16px 22px;box-shadow:0 -8px 30px rgba(20,33,61,.25);animation:sheet .26s cubic-bezier(.2,.7,.2,1) both}
  @keyframes sheet{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
  .modal-h{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px}
  .modal-h .mt{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:.01em;line-height:1.05}
  .modal-h .ms{font-size:12.5px;color:var(--muted);margin-top:3px}
  .modal-x{flex:none;width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center}
  .mblurb{font-size:13.5px;color:var(--text);line-height:1.5;margin:8px 0 4px}
  .srcrow{padding:11px 0;border-top:1px solid var(--line)}
  .srcrow .sk{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint)}
  .srcrow .sv{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:3px}
  .srcrow .ss{font-size:12.5px;color:var(--muted);margin-top:5px;line-height:1.4}
  .disclosure{margin-top:12px;background:var(--amber-tint);border:1px solid #f3cda3;border-radius:9px;padding:10px 12px;font-size:12.5px;color:#7a4510;line-height:1.45}
  .disclosure b{color:#5e3408}

  /* debug */
  .debug{margin-top:18px;border:1px solid #f3c3bd;border-radius:10px;background:#fdecea;padding:11px 13px;font-family:var(--mono);font-size:11px;line-height:1.6;color:#a52218;overflow-x:auto}
  .debug h4{margin:0 0 6px;font-family:var(--display);font-size:13px}
  .debug .ok{color:#0c6b34}

  /* motion */
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .anim-up{animation:up .28s cubic-bezier(.2,.7,.2,1) both}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<script src="cars.js"></script>
<script>
(function(){
"use strict";

/* =====================================================================
   HIGHER v3 — one anchor car per day, five timed rounds, each round a
   different challenger on a different hard stat. Every number shown is
   a sourced fact from cars.js; the game never derives, estimates, or
   computes a stat. No composite metric exists anywhere in this game.
   Single self-contained file + cars.js, vanilla JS, no backend.
   ===================================================================== */

var VERSION="v3.0", BUILD_DATE="2026-07-02";

var CONFIG = {
  roundSeconds: 10,          // the anti-Google mechanic; keep it tight
  nRounds: 5,
  // matchup curation: target relative-gap band per stat (fraction of the
  // anchor's value). Challengers inside the band read as "close".
  gapBands: {
    msrp:       [0.10, 0.60],
    msrp_adj:   [0.10, 0.60],
    hp:         [0.05, 0.40],
    zero_sixty: [0.05, 0.35],
    weight:     [0.03, 0.20],
    units_sold: [0.15, 3.00]
  }
};
var SHARE_URL="motor1.com/higher";
var DEBUG=/[?&]debug=1\b/.test(location.search);
var CARS=(window.HIGHER_CARS||[]).slice();

/* ---- dev check: one real car per entry. Any name containing " / " is
   flagged (console + ?debug=1 report) for editorial to split. ---- */
var COMPOUND_FLAGGED = CARS.filter(function(c){ return / \/ /.test(c.make) || / \/ /.test(c.model); });
if(COMPOUND_FLAGGED.length) try{ console.warn("HIGHER: "+COMPOUND_FLAGGED.length+" entries have compound names (\" / \"):", COMPOUND_FLAGGED.map(function(c){return c.id;})); }catch(e){}

/* ---- the stat menu. One stat per round, no repeats within a day. ---- */
function fmtMoney(n){ return "$"+Math.round(n).toLocaleString("en-US"); }
function fmtInt(n){ return Math.round(n).toLocaleString("en-US"); }
var STATS = [
  { key:"msrp",       label:"Original MSRP",   short:"original MSRP",
    q:"Which had the higher original MSRP?", sub:"Sticker price when new, not adjusted",
    tap:"Tap if higher", win:"HIGHER", lowerWins:false,
    fmt:fmtMoney, gapFmt:fmtMoney },
  { key:"msrp_adj",   label:"Adjusted MSRP",   short:"adjusted MSRP",
    q:"Which cost more in today's dollars?", sub:"Original MSRP, inflation-adjusted",
    tap:"Tap if higher", win:"HIGHER", lowerWins:false,
    fmt:fmtMoney, gapFmt:fmtMoney },
  { key:"hp",         label:"Horsepower",      short:"horsepower",
    q:"Which has more horsepower?", sub:"Factory rating",
    tap:"Tap if higher", win:"HIGHER", lowerWins:false,
    fmt:function(n){return fmtInt(n)+" hp";}, gapFmt:function(n){return fmtInt(n)+" hp";} },
  { key:"zero_sixty", label:"0-60 mph",        short:"0-60",
    q:"Which is quicker 0-60?", sub:"Lower time wins this one",
    tap:"Tap if quicker", win:"QUICKER", lowerWins:true,
    fmt:function(n){return n.toFixed(1)+"s";}, gapFmt:function(n){return n.toFixed(1)+"s";} },
  { key:"weight",     label:"Curb weight",     short:"curb weight",
    q:"Which is heavier at the curb?", sub:"Factory curb weight",
    tap:"Tap if heavier", win:"HEAVIER", lowerWins:false,
    fmt:function(n){return fmtInt(n)+" lb";}, gapFmt:function(n){return fmtInt(n)+" lb";} },
  { key:"units_sold", label:"Units sold",      short:"units sold",
    q:"Which sold more?", sub:"Total units",
    tap:"Tap if higher", win:"HIGHER", lowerWins:false,
    fmt:fmtInt, gapFmt:function(n){return fmtInt(n)+" units";} }
];
var STAT_BY_KEY={}; STATS.forEach(function(s){ STAT_BY_KEY[s.key]=s; });

/* ---- helpers ---- */
function hashString(str){ var h=2166136261>>>0; for(var i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);} return h>>>0; }
function mulberry32(seed){ var a=seed>>>0; return function(){ a|=0;a=(a+0x6d2b79f5)|0; var t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
function shuffle(arr,rng){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(rng()*(i+1)), t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function pad2(n){ return n<10?"0"+n:""+n; }
function todaySeed(){ var d=new Date(); return ""+d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate()); }
function dailyNumber(){ var d=new Date(); var now=Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()); return Math.floor((now-Date.UTC(2026,0,1))/86400000)+1; }
function reduced(){ return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; }
function fmtSecs(ms){ return (ms/1000).toFixed(1)+"s"; }
function carName(c){ return c.year+" "+c.make+" "+c.model; }
function shortCar(c){ return "'"+pad2(c.year%100)+" "+c.make+" "+c.model; }

/* ---- day builder: seeded anchor + 5 curated stat rounds ----
   Pairings are close or expectation-defying, never random: challengers
   come from the stat's gap band, and 1-2 rounds per day are "upset"
   picks where the intuitive answer is wrong. Cars with a null stat are
   never used in that stat's round. Nothing is estimated. ---- */
function usableStatKeys(anchor){
  return STATS.map(function(s){return s.key;}).filter(function(k){
    if(anchor.stats[k]==null) return false;
    return CARS.some(function(c){ return c!==anchor && c.stats[k]!=null && c.stats[k]!==anchor.stats[k]; });
  });
}
function statWinner(key,a,b){
  var st=STAT_BY_KEY[key];
  return st.lowerWins ? (a.stats[key]<b.stats[key]?a:b) : (a.stats[key]>b.stats[key]?a:b);
}
// "the intuitive answer is wrong" — intuition proxies, editorial-tunable:
// hp / 0-60 / weight / both MSRPs: the newer car intuitively wins, so an
// older-car win is the upset (the spec's example: the older car with the
// higher adjusted MSRP). units_sold: the cheaper car intuitively sold
// more, so the pricier car outselling it is the upset.
function isUpset(anchor,ch,key){
  if(anchor.year===ch.year) return false;
  var older=anchor.year<ch.year?anchor:ch;
  var w=statWinner(key,anchor,ch);
  if(key==="units_sold"){
    var pa=anchor.stats.msrp_adj, pb=ch.stats.msrp_adj;
    if(pa!=null&&pb!=null&&pa!==pb) return w===(pa>pb?anchor:ch);
  }
  return w===older;
}
function pickChallenger(anchor,key,used,rng,wantUpset){
  var av=anchor.stats[key];
  var cands=CARS.filter(function(c){ return c!==anchor && !used[c.id] && c.stats[key]!=null && c.stats[key]!==av; });
  if(!cands.length) return null;
  var band=CONFIG.gapBands[key]||[0,Infinity];
  function rel(c){ return Math.abs(c.stats[key]-av)/Math.abs(av); }
  var inBand=cands.filter(function(c){ var r=rel(c); return r>=band[0]&&r<=band[1]; });
  var pool;
  if(wantUpset){
    pool=inBand.filter(function(c){ return isUpset(anchor,c,key); });
    if(!pool.length) pool=cands.filter(function(c){ return isUpset(anchor,c,key); });
  } else {
    // non-upset rounds actively avoid upset pairings so the day stays at 1-2
    pool=inBand.filter(function(c){ return !isUpset(anchor,c,key); });
    if(!pool.length) pool=cands.filter(function(c){ return !isUpset(anchor,c,key); });
  }
  if(!pool||!pool.length) pool=inBand.length?inBand:cands;
  // prefer the tighter gaps: seeded pick among the 3 closest
  pool=pool.slice().sort(function(x,y){ return rel(x)-rel(y); });
  return pool[Math.floor(rng()*Math.min(3,pool.length))];
}
function buildDay(seed){
  var rng=mulberry32(hashString("higher3|"+seed));
  var pool=CARS.filter(function(c){ return usableStatKeys(c).length>=CONFIG.nRounds; });
  if(!pool.length) return null;
  var anchor=pool[Math.floor(rng()*pool.length)];
  var keys=shuffle(usableStatKeys(anchor),rng);
  var nUpsets=1+(rng()<0.45?1:0);                       // 1-2 upset rounds per day
  var upsetSlots={}; shuffle([0,1,2,3,4],rng).slice(0,nUpsets).forEach(function(i){ upsetSlots[i]=true; });
  var used={}, rounds=[];
  for(var i=0;i<keys.length && rounds.length<CONFIG.nRounds;i++){
    var ch=pickChallenger(anchor,keys[i],used,rng,!!upsetSlots[rounds.length]);
    if(!ch) continue;
    used[ch.id]=true;
    rounds.push({ stat:STAT_BY_KEY[keys[i]], ch:ch, upset:isUpset(anchor,ch,keys[i]) });
  }
  if(rounds.length<CONFIG.nRounds) return null;
  return { anchor:anchor, rounds:rounds };
}

/* ---- localStorage (namespaced higher3_ so v2 records don't collide) ---- */
function lsGet(k){ try{ return window.localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ window.localStorage.setItem(k,v); }catch(e){} }
function loadDaily(n){ try{ return JSON.parse(lsGet("higher3_daily_"+n)); }catch(e){ return null; } }
function saveDaily(n,rec){ lsSet("higher3_daily_"+n, JSON.stringify(rec)); }
function loadStats(){
  var d={streak:0,lastDay:null,perfect:0,lastPerfectDay:null,bestPerfectMs:null,played:0,history:[]};
  try{ var v=JSON.parse(lsGet("higher3_stats")); return (v&&typeof v.played==="number")?v:d; }catch(e){ return d; }
}
function saveStats(s){ lsSet("higher3_stats", JSON.stringify(s)); }
function recordDaily(day,score,timeMs,strip){
  if(loadDaily(day)) return;                             // first completion only; replays never overwrite
  saveDaily(day,{score:score,timeMs:timeMs,strip:strip});
  var st=loadStats();
  st.played=(st.played||0)+1;
  st.streak=(st.lastDay===day-1)?(st.streak||0)+1:1;     // a streak day = played
  st.lastDay=day;
  if(score===CONFIG.nRounds){                            // perfect streak = consecutive 5/5 days
    st.perfect=(st.lastPerfectDay===day-1)?(st.perfect||0)+1:1;
    st.lastPerfectDay=day;
    if(st.bestPerfectMs==null||timeMs<st.bestPerfectMs) st.bestPerfectMs=timeMs;
  } else st.perfect=0;
  st.history=(st.history||[]).concat([{day:day,score:score,timeMs:timeMs}]).slice(-90);
  saveStats(st);
}
function effectiveStreak(st,today){ return (st.lastDay===today||st.lastDay===today-1)?(st.streak||0):0; }
function effectivePerfect(st,today){ return (st.lastPerfectDay===today||st.lastPerfectDay===today-1)?(st.perfect||0):0; }

/* ---- DOM helper ---- */
function el(tag,props,kids){
  props=props||{}; var n=document.createElement(tag);
  for(var k in props){ var v=props[k];
    if(v==null||v===false) continue;
    if(k==="class") n.className=v; else if(k==="html") n.innerHTML=v; else if(k==="text") n.textContent=v;
    else if(k.indexOf("on")===0 && typeof v==="function") n.addEventListener(k.slice(2).toLowerCase(),v);
    else n.setAttribute(k,v);
  }
  kids=kids==null?[]:(Array.isArray(kids)?kids:[kids]);
  kids.forEach(function(c){ if(c==null||c===false) return; n.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return n;
}

function choose(side){
  var s=App.state; if(s.phase!=="play"||s.revealed) return;
  stopTimer();
  var elapsed=Math.min(Date.now()-s.roundStart, CONFIG.roundSeconds*1000);
  var round=s.rounds[s.idx];
  var winSide=statWinner(round.stat.key,s.anchor,round.ch)===s.anchor?"left":"right";
  s.picked=side; s.revealed=true; s.phase="reveal";
  s.results[s.idx]={ correct:side===winSide, picked:side, timeMs:elapsed };
  render(); window.scrollTo(0,0);
}
function timeUp(){
  var s=App.state; if(!s||s.phase!=="play") return;
  s.picked=null; s.revealed=true; s.phase="reveal";
  s.results[s.idx]={ correct:false, picked:null, timeMs:CONFIG.roundSeconds*1000 };
  render(); window.scrollTo(0,0);
}
function next(){
  var s=App.state;
  if(s.idx>=s.rounds.length-1){ finish(); return; }
  s.idx++;
  startRound();
}
function totalTime(s){ return s.results.reduce(function(t,r){ return t+(r?r.timeMs:0); },0); }
function finish(){
  var s=App.state;
  var score=s.results.filter(function(r){return r.correct;}).length;
  if(!s.practice) recordDaily(s.daily,score,totalTime(s),s.results.map(function(r){return r.correct?1:0;}));
  s.phase="end"; App.fresh=true; render(); window.scrollTo(0,0);
}

/* ---- end / share ---- */
function scoreVerdict(score){
  if(score===5) return "Perfect. The clock is your only rival now.";
  if(score===4) return "Sharp — one got away.";
  if(score===3) return "Respectable. The close ones are the skill.";
  if(score===2) return "The facts humbled you.";
  return "Rough day at the spec sheet.";
}
function closestMiss(s){
  var best=null,bestRel=Infinity;
  s.rounds.forEach(function(round,i){
    var r=s.results[i]; if(!r||r.correct) return;
    var av=s.anchor.stats[round.stat.key];
    var rel=Math.abs(av-round.ch.stats[round.stat.key])/Math.abs(av);
    if(rel<bestRel){ bestRel=rel; best=round; }
  });
  return best;
}
function shareText(s){
  var score=s.results.filter(function(r){return r.correct;}).length;
  var strip=s.results.map(function(r){return r.correct?"🟩":"🟥";}).join("");
  var lines=[
    (s.practice?"HIGHER (practice)":"HIGHER #"+s.daily)+" · Motor1",
    "Anchor: "+carName(s.anchor),
    strip+" "+score+"/"+s.rounds.length+" · "+fmtSecs(totalTime(s)),
  ];
  var miss=closestMiss(s);
  if(miss) lines.push("Missed: "+miss.stat.short+" vs. "+shortCar(miss.ch));
  lines.push(SHARE_URL);
  return lines.join("\n");
}

    COMPOUND_FLAGGED.forEach(function(c){ box.appendChild(el("div",{text:"  • "+c.id})); });
  } else box.appendChild(el("div",{class:"ok",text:"No compound names — one real car per entry. ✓"}));
  box.appendChild(el("div",{text:"Stat completeness ("+keys.map(function(k){return STAT_BY_KEY[k].label;}).join(" · ")+"):"}));
  CARS.forEach(function(c){
    var marks=keys.map(function(k){ return c.stats&&c.stats[k]!=null?"✓":"·"; }).join("");
    var n=keys.filter(function(k){ return c.stats&&c.stats[k]!=null; }).length;
    box.appendChild(el("div",{class:n===keys.length?"ok":"",text:marks+" "+n+"/"+keys.length+"  "+c.id}));
  });
  return box;
}

/* ---- boot ---- */
App.root=document.getElementById("app");
if(CARS.length) setDaily();
App.fresh=true; render();
window.__HIGHER__={ VERSION:VERSION, CARS:CARS, CONFIG:CONFIG, STATS:STATS,
  buildDay:buildDay, dailyNumber:dailyNumber, isUpset:isUpset,
  _forceTimeout:function(){ if(App.state&&App.state.phase==="play"){ stopTimer(); timeUp(); } },
  _state:function(){ return App.state; } };
})();
</script>
