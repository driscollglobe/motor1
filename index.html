<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Higher — the Motor1 Index game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#e9edf2; --panel:#ffffff; --panel2:#f1f5f9; --line:#dde4ec;
    --text:#13181e; --muted:#5b6672; --faint:#909aa6;
    --blue:#1f6dff; --blue-deep:#0a4fc4; --blue-tint:#eaf1ff;
    --amber:#e07b27; --amber-tint:#fbe9d8;
    --green:#12a14b; --green-tint:#e7f6ee; --red:#df3a30; --ink:#ffffff;
    --display:"Oswald",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --shadow:0 1px 2px rgba(20,33,61,.06),0 1px 3px rgba(20,33,61,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  #app{max-width:460px;margin:0 auto;padding:12px 12px 32px;min-height:100vh}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .green{color:var(--green)} .red{color:var(--red)} .blue{color:var(--blue)}
  button{font-family:var(--sans);cursor:pointer;border:0;color:inherit;background:none}
  button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--blue);outline-offset:2px}

  /* topbar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 12px;border-bottom:1px solid var(--line);margin-bottom:12px}
  .m1{display:inline-flex;align-items:center;gap:1px;text-decoration:none;color:var(--text);font-family:var(--sans);font-weight:800;font-size:23px;letter-spacing:-.02em;line-height:1}
  .m1 svg{width:25px;height:25px;display:block;margin:0 0 1px 0}
  .m1 .com{font-size:13px;font-weight:700;align-self:flex-end;margin-bottom:3px;letter-spacing:0}
  .topright{display:flex;align-items:center;gap:10px}
  .gamechip{text-align:right;line-height:1}
  .gamechip .gn{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:.06em;color:var(--text)}
  .gamechip .gd{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-top:2px}
  .infobtn{flex:none;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);background:var(--panel);color:var(--muted);font-family:var(--display);font-weight:700;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center}
  .infobtn:hover{border-color:var(--blue);color:var(--blue)}

  /* hud */
  .hud{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .pips{display:flex;gap:4px;flex-wrap:wrap;flex:1}
  .pip{width:14px;height:6px;border-radius:3px;background:var(--line)}
  .pip.win{background:var(--green)} .pip.miss{background:var(--red)} .pip.now{background:var(--blue)}
  .streakchip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue-deep);background:var(--blue-tint);border:1px solid #cfe0ff;border-radius:20px;padding:4px 11px;flex:none}
  .streakchip.hot{color:#b3460a;background:#fdeede;border-color:#f3cda3}

  /* prompt */
  .prompt{text-align:center;margin:2px 0 12px}
  .prompt .q{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:.01em;line-height:1.1}
  .prompt .q .idx{color:var(--blue)}
  .prompt .sub{font-size:12px;color:var(--muted);margin-top:3px}
  .prompt .sub a{color:var(--blue);font-weight:600;text-decoration:none;border-bottom:1px dotted var(--blue)}

  /* cars */
  .ring{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:stretch;position:relative}
  .vs{position:absolute;left:50%;top:54px;transform:translate(-50%,-50%);z-index:3;width:34px;height:34px;border-radius:50%;background:var(--text);color:#fff;font-family:var(--display);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(20,33,61,.25)}
  .car{background:var(--panel);border:1px solid var(--line);border-top:4px solid var(--side,var(--blue));border-radius:12px;padding:13px 12px 14px;box-shadow:var(--shadow);text-align:left;display:flex;flex-direction:column;min-height:150px;width:100%;transition:transform .12s ease, box-shadow .12s ease}
  .car.tap{cursor:pointer} .car.tap:active{transform:scale(.98)}
  .car.left{--side:var(--blue)} .car.right{--side:var(--amber)}
  .car .yr{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.04em}
  .car .mk{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--side,var(--blue));text-transform:uppercase;letter-spacing:.08em;margin-top:5px}
  .car .md{font-family:var(--display);font-weight:600;font-size:18px;line-height:1.08;margin-top:3px;letter-spacing:.005em}
  .car .badge{align-self:flex-start;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.03em;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:3px 7px;margin-top:9px}
  .car .taphint{margin-top:auto;font-family:var(--display);font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--side,var(--blue));text-align:center;border-top:1px dashed var(--line);padding-top:9px;margin-top:12px}
  /* reveal additions */
  .car .anchor{margin-top:9px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .car .anchor b{color:var(--text);font-weight:600}
  .car .ixk{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-top:10px}
  .car .ix{font-family:var(--mono);font-weight:600;font-size:29px;line-height:1;margin-top:3px}
  .car .est{font-family:var(--mono);font-size:9px;color:var(--faint);margin-left:5px;text-transform:none;letter-spacing:0}
  .car .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
  .tag{font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:.07em;border-radius:5px;padding:2px 7px}
  .tag.pick{color:var(--blue-deep);background:var(--blue-tint);border:1px solid #cfe0ff}
  .tag.win{color:#fff;background:var(--green)}
  .car .mathhint{margin-top:auto;font-family:var(--mono);font-size:10px;color:var(--blue);text-align:center;border-top:1px dashed var(--line);padding-top:8px;margin-top:11px}
  .car.win{border-color:var(--green);box-shadow:0 0 0 2px var(--green) inset, 0 6px 18px rgba(18,161,75,.16)}
  .car.win .ix{color:var(--green)} .car.lose{opacity:.62}

  /* pain marker */
  .pain{margin-top:12px;text-align:center;border-radius:10px;padding:10px 12px;font-size:13.5px;line-height:1.35;border:1px solid var(--line);box-shadow:var(--shadow)}
  .pain.good{background:var(--green-tint);border-color:#b6e2c8;color:#0c6b34}
  .pain.bad{background:#fdecea;border-color:#f3c3bd;color:#a52218}
  .pain b{font-weight:700}

  /* breakdown */
  .breakdown{margin-top:11px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px 13px;box-shadow:var(--shadow)}
  .breakdown .bh{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .leg{display:inline-flex;gap:10px}
  .leg span{display:inline-flex;align-items:center;gap:4px;font-size:9.5px}
  .leg i{width:9px;height:9px;border-radius:2px;display:inline-block}
  .leg .la{background:var(--blue)} .leg .lb{background:var(--amber)}
  .drow{margin-bottom:9px} .drow:last-child{margin-bottom:0}
  .drow .dl{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between}
  .drow .dl .de{color:var(--faint);text-transform:none;letter-spacing:0}
  .bar{display:flex;align-items:center;gap:7px;margin-bottom:3px}
  .bar .track{flex:1;height:8px;background:var(--panel2);border-radius:5px;overflow:hidden}
  .bar .fill{height:100%;width:0;border-radius:5px;transition:width .6s cubic-bezier(.2,.7,.2,1)}
  .bar.a .fill{background:var(--blue)} .bar.b .fill{background:var(--amber)}
  .bar .bv{font-family:var(--mono);font-size:10.5px;font-weight:600;width:24px;text-align:right;color:var(--muted)}
  .bar.hi .bv{color:var(--text)} .bar.hi .fill{filter:saturate(1.15)}

  /* verdict */
  .verdict{margin-top:11px;background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:10px;padding:11px 13px;font-size:13.5px;line-height:1.4;box-shadow:var(--shadow)}
  .verdict .vk{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--blue);margin-bottom:3px}
  .verdict b{font-weight:700}

  /* buttons */
  .btn{display:block;width:100%;text-align:center;border-radius:10px;padding:14px;margin-top:12px;font-family:var(--display);font-weight:600;font-size:16px;letter-spacing:.03em;text-transform:uppercase}
  .btn.primary{background:var(--blue);color:var(--ink);box-shadow:0 2px 8px rgba(31,109,255,.32)} .btn.primary:active{filter:brightness(.94)}
  .btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--text);font-size:13px;padding:12px;box-shadow:var(--shadow)}

  /* intro */
  .intro{padding:14px 4px 4px}
  .intro .big{font-family:var(--display);font-weight:700;font-size:36px;line-height:1.03;letter-spacing:.005em;text-wrap:balance}
  .intro .big .hl{color:var(--blue)}
  .intro .lede{font-size:14px;color:var(--muted);line-height:1.5;margin:13px 0 4px;max-width:42ch}
  .intro .lede a{color:var(--blue);font-weight:600;text-decoration:none;border-bottom:1px dotted var(--blue)}
  .how{display:flex;flex-direction:column;gap:9px;margin:18px 0 6px;border-top:1px solid var(--line);padding-top:16px}
  .how .h{display:flex;gap:11px;align-items:flex-start}
  .how .n{flex:none;width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-family:var(--mono);font-weight:600;font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .how .t{font-size:13px;color:var(--text);line-height:1.42}
  .statline{display:flex;gap:8px;margin:14px 0 2px}
  .statbox{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 8px;text-align:center;box-shadow:var(--shadow)}
  .statbox .k{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .statbox .v{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:3px;color:var(--blue-deep)}
  .donebanner{display:flex;align-items:center;gap:10px;background:var(--green-tint);border:1px solid #b6e2c8;border-radius:9px;padding:10px 12px;margin:0 0 12px;font-size:12.5px;color:#0c6b34;line-height:1.35}
  .donebanner b{font-weight:700}
  .indexcard{margin:16px 0 2px;background:var(--blue-tint);border:1px solid #cfe0ff;border-radius:12px;padding:13px 14px}
  .indexcard .ic-k{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
  .indexcard .ic-b{font-size:13px;color:var(--text);line-height:1.45}
  .indexcard .ic-link{display:inline-block;margin-top:8px;font-family:var(--display);font-weight:600;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--blue)}
  .foot{margin-top:18px;text-align:center;font-size:11px;color:var(--faint);line-height:1.5}

  /* end */
  .endhead{text-align:center;padding:8px 0 2px}
  .endhead .k{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  .endhead .score{font-family:var(--mono);font-weight:600;font-size:52px;line-height:1;margin-top:4px;color:var(--blue)}
  .endhead .ssub{font-size:13px;color:var(--muted);margin-top:4px}
  .lesson{margin-top:14px;background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--amber);border-radius:10px;padding:12px 13px;box-shadow:var(--shadow)}
  .lesson .lk{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--amber);margin-bottom:4px}
  .lesson .lt{font-size:14px;line-height:1.4;color:var(--text)} .lesson .lt b{font-weight:700}
  .endstats{display:flex;gap:8px;margin-top:14px}
  .reviewlist{margin-top:14px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow)}
  .rev{display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid var(--line);font-size:12.5px} .rev:last-child{border-bottom:0}
  .rev .ri{flex:none;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
  .rev .ri.w{background:var(--green)} .rev .ri.m{background:var(--red)}
  .rev .rc{flex:1;line-height:1.3} .rev .rc b{font-weight:600}
  .rev .rg{font-family:var(--mono);font-size:11px;color:var(--faint);flex:none}
  .share{margin-top:14px;background:var(--blue-tint);border:1px dashed #b9d2ff;border-radius:10px;padding:12px 13px;font-family:var(--mono);font-size:12.5px;white-space:pre-wrap;line-height:1.55;color:var(--text)}

  /* modal (transparency panels) */
  .scrim{position:fixed;inset:0;background:rgba(20,33,61,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .modal{background:var(--panel);border-radius:16px 16px 0 0;width:100%;max-width:460px;max-height:88vh;overflow:auto;padding:16px 16px 22px;box-shadow:0 -8px 30px rgba(20,33,61,.25);animation:sheet .26s cubic-bezier(.2,.7,.2,1) both}
  @keyframes sheet{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
  .modal-h{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px}
  .modal-h .mt{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:.01em;line-height:1.05}
  .modal-h .ms{font-size:12.5px;color:var(--muted);margin-top:3px}
  .modal-x{flex:none;width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center}
  .mblurb{font-size:13.5px;color:var(--text);line-height:1.5;margin:8px 0 4px}
  .inputrow{display:flex;align-items:baseline;gap:9px;padding:10px 0;border-top:1px solid var(--line)}
  .inputrow .iw{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--blue-deep);width:48px;flex:none}
  .inputrow .il{font-family:var(--display);font-weight:600;font-size:14px;width:96px;flex:none}
  .inputrow .ib{font-size:12px;color:var(--muted);line-height:1.35;flex:1}
  .inputrow .ib em{color:var(--amber);font-style:normal;font-weight:600}
  .disclosure{margin-top:12px;background:var(--amber-tint);border:1px solid #f3cda3;border-radius:9px;padding:10px 12px;font-size:12.5px;color:#7a4510;line-height:1.45}
  .disclosure b{color:#5e3408}
  /* car-math modal rows */
  .mathrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-top:1px solid var(--line);font-family:var(--mono);font-size:13px}
  .mathrow .ml{flex:1;color:var(--text)} .mathrow .ml .mlsub{color:var(--faint);font-size:11px}
  .mathrow .mc{font-weight:600}
  .mathtot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:11px;border-top:2px solid var(--line);font-family:var(--mono)}
  .mathtot .mtl{font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:.04em;text-transform:uppercase}
  .mathtot .mtv{font-size:24px;font-weight:600;color:var(--blue)}

  /* debug */
  .debug{margin-top:18px;border:1px solid #f3c3bd;border-radius:10px;background:#fdecea;padding:11px 13px;font-family:var(--mono);font-size:11.5px;line-height:1.5;color:#a52218}
  .debug h4{margin:0 0 6px;font-family:var(--display);font-size:13px}

  /* motion */
  @keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.06);opacity:1}100%{transform:scale(1)}}
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .anim-up{animation:up .28s cubic-bezier(.2,.7,.2,1) both}
  .anim-pop{animation:pop .34s cubic-bezier(.2,.7,.2,1) both}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
"use strict";

/* =====================================================================
   HIGHER — the Motor1 Index game. Two cars; pick the higher Motor1 Index
   (0-100), a Motor1-owned composite (NOT a dollar figure). The reveal is a
   glass box: every number is one tap from its sub-score math, and a standing
   panel explains the Index. Single self-contained file, vanilla JS, no backend.
   ===================================================================== */

var CARS = [
  { "year":1955, "make":"Mercedes-Benz", "model":"300 SLR Uhlenhaut Coupe", "category":"Holy Grail", "value":"$140M+ (record)", "rating":89.5, "sv":1, "sp":0.55, "sd":1, "sr":0.9, "approx":true },
  { "year":1962, "make":"Ferrari", "model":"250 GTO", "category":"Holy Grail", "value":"$50M-70M+", "rating":85.6, "sv":0.902, "sp":0.55, "sd":1, "sr":0.9, "approx":true },
  { "year":1937, "make":"Bugatti", "model":"Type 57SC Atlantic", "category":"Holy Grail", "value":"$30M-40M+", "rating":83.1, "sv":0.839, "sp":0.55, "sd":1, "sr":0.9, "approx":true },
  { "year":1957, "make":"Ferrari", "model":"335 S Scaglietti", "category":"Holy Grail", "value":"$30M+", "rating":82.4, "sv":0.822, "sp":0.55, "sd":1, "sr":0.9, "approx":true },
  { "year":1994, "make":"McLaren", "model":"F1", "category":"European GT", "value":"$20M+", "rating":73.0, "sv":0.775, "sp":0.8, "sd":0.5, "sr":0.9, "approx":true },
  { "year":2014, "make":"Porsche / Ferrari / McLaren", "model":"918 / LaFerrari / P1", "category":"Modern Hypercar", "value":"$1.5M-5M each", "rating":71.1, "sv":0.564, "sp":0.9, "sd":0.95, "sr":0.45, "approx":true },
  { "year":1953, "make":"Jaguar", "model":"C-Type / D-Type", "category":"Prewar / Classic", "value":"$5M-25M", "rating":70.6, "sv":0.741, "sp":0.55, "sd":0.66, "sr":0.9, "approx":true },
  { "year":1961, "make":"Aston Martin", "model":"DB4 GT Zagato", "category":"1950s-60s Classic", "value":"$10M+", "rating":68.8, "sv":0.694, "sp":0.55, "sd":0.66, "sr":0.9, "approx":true },
  { "year":2005, "make":"Bugatti", "model":"Veyron", "category":"Modern Hypercar", "value":"$1.5M-2.5M", "rating":68.8, "sv":0.508, "sp":0.9, "sd":0.95, "sr":0.45, "approx":true },
  { "year":1936, "make":"Mercedes-Benz", "model":"540K Special Roadster", "category":"Prewar / Classic", "value":"$5M-12M", "rating":68.0, "sv":0.675, "sp":0.55, "sd":0.66, "sr":0.9, "approx":true },
  { "year":2017, "make":"Ford", "model":"GT", "category":"Modern Hypercar", "value":"$1M-1.8M", "rating":67.1, "sv":0.466, "sp":0.9, "sd":0.95, "sr":0.45, "approx":true },
  { "year":1971, "make":"Plymouth", "model":"Hemi 'Cuda", "category":"American Muscle", "value":"$1M-3.5M", "rating":66.1, "sv":0.521, "sp":0.8, "sd":0.9, "sr":0.45, "approx":true },
  { "year":1931, "make":"Bugatti", "model":"Type 41 Royale", "category":"Holy Grail", "value":"Essentially priceless", "rating":64.0, "sv":0.4, "sp":0.55, "sd":1, "sr":0.8, "approx":true },

var WEIGHTS = { value:0.40, performance:0.20, desirability:0.25, rarity:0.15 };
// Value is REAL; the other three are approximations (every car carries approx:true).
var DIMS = [
  { key:"sv", w:"value",        label:"Value",        real:true,  blurb:"Real market price — what it actually trades for." },
  { key:"sd", w:"desirability", label:"Desirability", real:false, blurb:"How badly people want it." },
  { key:"sp", w:"performance",  label:"Performance",  real:false, blurb:"Pace and capability." },
  { key:"sr", w:"rarity",       label:"Rarity",       real:false, blurb:"How few were built." },
];

var SHARE_URL = "higher.motor1.com";

/* ---- the cleaning gate: one real car per entry. Compound "Frankenstein" rows
   (make or model contains " / ") are excluded from play until an editorial pass
   splits them. ?debug=1 lists them. ---- */
function isCompound(c){ return / \/ /.test(c.make) || / \/ /.test(c.model); }
var COMPOUNDS = CARS.filter(isCompound);
var PLAYABLE = CARS.filter(function(c){ return !isCompound(c); });
if(DEBUG && COMPOUNDS.length) try{ console.warn("HIGHER: "+COMPOUNDS.length+" compound entries excluded:", COMPOUNDS.map(function(c){return c.make+" "+c.model;})); }catch(e){}

/* ---- the Motor1 Index: 100 * weighted sum of the four 0..1 sub-scores ---- */
function mIndex(c){
  if(c._i!=null) return c._i;
  c._i = 100*(WEIGHTS.value*c.sv + WEIGHTS.performance*c.sp + WEIGHTS.desirability*c.sd + WEIGHTS.rarity*c.sr);
  return c._i;
}
function fmtIdx(v){ return v.toFixed(1); }
function sub100(c,key){ return Math.round(c[key]*100); }   // a sub-score as 0..100 for display

var CATEGORY_LABELS = {
  "Holy Grail":"Auction Legend", "Prewar / Classic":"Auction Legend", "1950s-60s Classic":"Poster Car",

};
var MODEL_OVERRIDE = [
  { re:/E30 M3|\b959\b|3\.0 CSL|Carrera RS 2\.7|Superbird|Charger Daytona|GT-R \(R32\)/, label:"Homologation Special" },
  { re:/GNX|Grand National|Syclone/, label:"Malaise-Era Sleeper" },

];
function catLabel(c){
  for(var i=0;i<MODEL_OVERRIDE.length;i++) if(MODEL_OVERRIDE[i].re.test(c.model)) return MODEL_OVERRIDE[i].label;
  return CATEGORY_LABELS[c.category] || c.category;

function hashString(str){ var h=2166136261>>>0; for(var i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);} return h>>>0; }
function mulberry32(seed){ var a=seed>>>0; return function(){ a|=0;a=(a+0x6d2b79f5)|0; var t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
function pad2(n){ return n<10?"0"+n:""+n; }
function todaySeed(){ var d=new Date(); return ""+d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate()); }
function dailyNumber(){ var d=new Date(); var now=Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()); return Math.floor((now-Date.UTC(2026,0,1))/86400000)+1; }
function reduced(){ return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; }

/* ---- the day's paced sequence (seeded). Gaps are biased WIDER (>= CONFIG.minGap)
   while the data is approximate; tighten minGap once the Index is sourced. ---- */
var GAP_TARGETS = [18, 14, 10, 7, 6, 5, 16, 6, 5, 8, 5, 5];
function buildSequence(seed){
  var rng = mulberry32(hashString("higher|"+seed));
  var pool = PLAYABLE.map(function(c,i){ return { c:c, i:i, r:mIndex(c) }; }).sort(function(a,b){ return a.r-b.r; });
  var targets = GAP_TARGETS.slice(0, CONFIG.nMatchups).map(function(t){ return Math.max(CONFIG.minGap, t + (rng()*3-1.5)); });
  var used = new Array(pool.length), seq=[];
  targets.forEach(function(t){
    var bestDelta=Infinity, ties=[];
    for(var x=0;x<pool.length;x++){ if(used[x]) continue;
      for(var y=x+1;y<pool.length;y++){ if(used[y]) continue;
        var gap = pool[y].r - pool[x].r;
        if(gap < CONFIG.minGap) continue;                  // floor: never split hairs on soft data
        var delta = Math.abs(gap - t);
        if(delta < bestDelta - 1e-9){ bestDelta=delta; ties=[[x,y]]; }
        else if(delta < bestDelta + 0.25){ ties.push([x,y]); }
      }
    }
    if(!ties.length){   // fallback: widest unused pair (keeps the day full on tiny datasets)
      var fb=null, fbGap=-1;
      for(var x2=0;x2<pool.length;x2++){ if(used[x2]) continue;
        for(var y2=x2+1;y2<pool.length;y2++){ if(used[y2]) continue;
          var g2=pool[y2].r-pool[x2].r; if(g2>fbGap){ fbGap=g2; fb=[x2,y2]; } } }
      if(!fb) return; ties=[fb];
    }
    var best = ties[Math.floor(rng()*ties.length)];
    used[best[0]]=true; used[best[1]]=true;
    var lo=pool[best[0]], hi=pool[best[1]], flip=rng()<0.5;
    seq.push({ a: flip?hi:lo, b: flip?lo:hi });
  });
  return seq;
}

/* ---- the deciding factor(s): dimensions where the winner most out-earned the loser ---- */
function decidingDims(win, lose){
  var scored = DIMS.map(function(d){ return { d:d, c:(win[d.key]-lose[d.key])*WEIGHTS[d.w] }; })
    .filter(function(o){ return o.c>0; }).sort(function(a,b){ return b.c-a.c; });
  return scored.map(function(o){ return o.d; });
}
function joinLabels(dims){
  var names=dims.map(function(d){ return d.label.toLowerCase(); });
  if(names.length===1) return names[0];
  if(names.length===2) return names[0]+" and "+names[1];
  return names.slice(0,-1).join(", ")+" and "+names[names.length-1];
}
function verdictLine(a,b){
  var win = mIndex(a)>=mIndex(b)?a:b, lose = win===a?b:a;
  var gap = Math.abs(mIndex(a)-mIndex(b));
  var dims = decidingDims(win, lose).slice(0,2);
  var on = dims.length ? " on "+joinLabels(dims) : "";
  if(gap >= 16) return "The "+win.model+" runs away"+on+".";
  if(gap >= 8)  return "The "+win.model+" takes it"+on+".";
  return "The "+win.model+" edges it"+on+".";
}

/* ---- DOM helper ---- */
function el(tag,props,kids){
  props=props||{}; var n=document.createElement(tag);
  for(var k in props){ var v=props[k];
    if(v==null||v===false) continue;
    if(k==="class") n.className=v; else if(k==="html") n.innerHTML=v; else if(k==="text") n.textContent=v;
    else if(k.indexOf("on")===0 && typeof v==="function") n.addEventListener(k.slice(2).toLowerCase(),v);
    else n.setAttribute(k,v);
  }
  kids = kids==null?[]:(Array.isArray(kids)?kids:[kids]);
  kids.forEach(function(c){ if(c==null||c===false) return; n.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return n;
}
function animateCount(node, from, to, ms, fmt){
  fmt = fmt || function(v){ return String(Math.round(v)); };
  if(!node) return;
  if(reduced() || ms<=0 || from===to){ node.textContent=fmt(to); return; }
  var t0=null, done=false;
  function finish(){ if(done) return; done=true; node.textContent=fmt(to); }
  function step(ts){ if(done) return; if(t0===null) t0=ts; var t=Math.min(1,(ts-t0)/ms), e=1-Math.pow(1-t,3);
    node.textContent=fmt(from+(to-from)*e); if(t<1) requestAnimationFrame(step); else finish(); }
  requestAnimationFrame(step); setTimeout(finish, ms+80);
}

function scoreVerdict(score, total){ var p=score/(total||CONFIG.nMatchups);
  if(p>=0.92) return "Collector-grade. You know the market."; if(p>=0.75) return "Sharp eye.";
  if(p>=0.5) return "Respectable. The close ones are the skill."; if(p>=0.25) return "The market humbled you."; return "Rough day at auction."; }
// the day's takeaway, computed: which factor decided the most matchups (weighted-largest sub-score gap).
function marketLesson(state){
  var tally={}; DIMS.forEach(function(d){ tally[d.key]=0; });
  state.seq.forEach(function(m){ var win=mIndex(m.a.c)>=mIndex(m.b.c)?m.a.c:m.b.c, lose=win===m.a.c?m.b.c:m.a.c;
    var dd=decidingDims(win,lose)[0]; if(dd) tally[dd.key]++; });
  var top=DIMS[0], mx=-1; DIMS.forEach(function(d){ if(tally[d.key]>mx){ mx=tally[d.key]; top=d; } });
  var lines={ sv:"Money talked today — raw <b>value</b> decided more matchups than anything else.",
    sd:"<b>Desirability</b> ran the board today — want beat numbers in most calls.",
    sp:"<b>Performance</b> did the deciding today — pace carried the most matchups.",
    sr:"<b>Rarity</b> beat fame today — scarcity decided more matchups than value or hype." };
  return (lines[top.key]||"A mixed board today.")+" ("+mx+" of "+state.seq.length+" matchups)";
}

  // review (closest miss highlighted via gap)
  var list=el("div",{class:"reviewlist"});
  s.seq.forEach(function(m,i){ var r=s.results[i]; if(!r) return;
    var win=mIndex(m.a.c)>=mIndex(m.b.c)?m.a.c:m.b.c, gap=Math.abs(mIndex(m.a.c)-mIndex(m.b.c));
    list.appendChild(el("div",{class:"rev"},[
      el("div",{class:"ri "+(r.correct?"w":"m"),text:r.correct?"✓":"✕"}),
      el("div",{class:"rc"},[ el("b",{text:win.year+" "+win.model}), " over "+(function(l){return l.year+" "+l.model;})(win===m.a.c?m.b.c:m.a.c) ]),
      el("div",{class:"rg",text:fmtIdx(gap)}),
    ]));
  });
  wrap.appendChild(list);

  // closest miss (smallest gap among wrong answers) — share bait
  var miss=null; s.seq.forEach(function(m,i){ if(s.results[i]&&!s.results[i].correct){ var g=Math.abs(mIndex(m.a.c)-mIndex(m.b.c)); if(miss==null||g<miss) miss=g; } });
  var strip=s.results.map(function(r){ return r.correct?"🟩":"⬜"; }).join("");
  var line1=(s.practice?"🏁 HIGHER (practice) — ":"🏁 HIGHER #"+s.daily+" — ")+score+"/"+s.seq.length;
  var line2="🔥 Best streak "+s.best+(miss!=null?"   ·   closest miss "+fmtIdx(miss):"   ·   no misses");
  var shareText=line1+"\n"+line2+"\n"+strip+"\n"+SHARE_URL;
  wrap.appendChild(el("div",{class:"share",text:shareText}));
  wrap.appendChild(el("button",{class:"btn primary",text:"Copy result",onclick:function(ev){ copyShare(shareText, ev.currentTarget); }}));
  wrap.appendChild(el("button",{class:"btn ghost",text:"Practice run (random cars)",onclick:function(){ setPractice(); start(); }}));
  return wrap;
}
function copyShare(text, btn){
  var full = text.indexOf(SHARE_URL)>=0 ? text.replace(SHARE_URL, location.href) : (text+"\n"+location.href);
  var done=function(){ var t=btn.textContent; btn.textContent="Copied ✓"; setTimeout(function(){ btn.textContent=t; },1400); };
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(full).then(done,done); else done();
}

/* ---- debug: the cleaning-gate check (lists compound entries) ---- */
function debugView(){
  var box=el("div",{class:"debug"},[ el("h4",{text:"DEBUG · cleaning gate"}),
    el("div",{text:COMPOUNDS.length+" compound entries excluded from play (make/model contains \" / \"):"}) ]);
  COMPOUNDS.forEach(function(c){ box.appendChild(el("div",{text:"• "+c.year+" "+c.make+" "+c.model})); });
  box.appendChild(el("div",{style:"margin-top:6px",text:PLAYABLE.length+" playable cars."}));
  return box;
}

/* ---- boot ---- */
App.root=document.getElementById("app");
setDaily(); App.fresh=true; render();
window.__HIGHER__ = { CARS:CARS, PLAYABLE:PLAYABLE, COMPOUNDS:COMPOUNDS, WEIGHTS:WEIGHTS, CONFIG:CONFIG, mIndex:mIndex, buildSequence:buildSequence, catLabel:catLabel, dailyNumber:dailyNumber };
})();
</script>
