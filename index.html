<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Model Year — a daily car-industry game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    /* Motor1.com light theme */
    --bg:#e9edf2; --panel:#ffffff; --panel2:#f1f5f9; --line:#dde4ec;
    --text:#13181e; --muted:#5b6672; --faint:#909aa6;
    --blue:#1f6dff; --blue-deep:#0a4fc4; --blue-tint:#eaf1ff;
    --green:#12a14b; --red:#df3a30; --ink:#ffffff;
    --display:"Oswald",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --shadow:0 1px 2px rgba(20,33,61,.06),0 1px 3px rgba(20,33,61,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  #app{max-width:460px;margin:0 auto;padding:12px 12px 40px;min-height:100vh}
  .display{font-family:var(--display);text-transform:uppercase;letter-spacing:.02em}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .green{color:var(--green)} .red{color:var(--red)} .accent{color:var(--blue)} .blue{color:var(--blue)}
  button{font-family:var(--sans);cursor:pointer;border:0;color:inherit;background:none}
  button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
  .row{display:flex;align-items:center;gap:8px}
  .spread{justify-content:space-between}
  .stack{display:flex;flex-direction:column}
  .grow{flex:1}

  /* topbar + motor1 logo */
  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding:4px 2px 12px;border-bottom:1px solid var(--line);margin-bottom:12px}
  .m1{display:inline-flex;align-items:center;gap:1px;text-decoration:none;color:var(--text);
    font-family:var(--sans);font-weight:800;font-size:23px;letter-spacing:-.02em;line-height:1}
  .m1 svg{width:25px;height:25px;display:block;margin:0 0 1px 0}
  .m1 .com{font-size:13px;font-weight:700;align-self:flex-end;margin-bottom:3px;letter-spacing:0}
  .topright{display:flex;align-items:center;gap:10px}
  .helpbtn{flex:none;width:25px;height:25px;border-radius:50%;border:1.5px solid var(--line);background:var(--panel);
    color:var(--muted);font-weight:700;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center}
  .helpbtn:hover{border-color:var(--blue);color:var(--blue)}
  .gamechip{text-align:right;line-height:1}
  .gamechip .gn{font-family:var(--display);font-weight:700;font-size:15px;letter-spacing:.04em;color:var(--text)}
  .gamechip .gd{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-top:2px}

  /* status cluster */
  .cluster{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
  .gauge{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 8px;text-align:center;box-shadow:var(--shadow)}
  .gauge .k{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-family:var(--mono)}
  .gauge .v{font-family:var(--mono);font-size:16px;font-weight:600;margin-top:2px;line-height:1}
  .gauge.year .v{color:var(--blue)}

  /* standings ticker + nemesis head-to-head */
  .statusbar{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
  .tick{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.04em}
  .tick.up{color:var(--green)} .tick.down{color:var(--red)} .tick.flat{color:var(--muted)}
  .nemesis{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);
    border-left:3px solid var(--red);border-radius:8px;padding:8px 11px;box-shadow:var(--shadow)}
  .ne-callout{flex-basis:100%;margin-top:5px;padding-top:5px;border-top:1px solid var(--line);font-family:var(--display);font-weight:600;font-size:13px;letter-spacing:.02em}
  .ne-callout.good{color:var(--green)} .ne-callout.bad{color:var(--red)}
  .nemesis.ahead{border-left-color:var(--green)}
  .nemesis .ne-ic{font-family:var(--mono);font-weight:700}
  .nemesis.behind .ne-ic{color:var(--red)} .nemesis.ahead .ne-ic{color:var(--green)}
  .nemesis .ne-txt{font-size:12.5px;flex:1;line-height:1.3} .nemesis .ne-txt b{font-weight:700}
  .nemesis .ne-left{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;text-align:right;flex:none}
  /* forecast-resolution beat */
  .beat{display:flex;gap:8px;align-items:flex-start;font-size:13px;line-height:1.4;border-radius:8px;padding:9px 11px;margin-bottom:10px}
  .beat .beat-ic{flex:none}
  .beat.good{background:#e7f6ee;color:#0c6b34;border:1px solid #b6e2c8}
  .beat.bad{background:#fdecea;color:#a52218;border:1px solid #f3c3bd}
  .beat.flat{background:var(--panel2);color:var(--muted);border:1px solid var(--line)}

  /* event banner */
  .event{background:var(--panel);border:1px solid var(--line);
    border-left:4px solid var(--blue);border-radius:8px;padding:10px 12px;margin-bottom:12px;box-shadow:var(--shadow)}
  .event .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);font-family:var(--mono)}
  .event .ttl{font-family:var(--display);font-weight:600;font-size:17px;margin:2px 0 3px}
  .event .body{font-size:13px;color:var(--muted);line-height:1.35}

  /* delayed-capacity hint */
  .buildhint{background:var(--blue-tint);border:1px solid #cfe0ff;border-radius:8px;padding:8px 11px;
    font-size:12px;color:var(--blue-deep);line-height:1.35;margin-bottom:10px}
  .buildhint b{color:var(--blue-deep)}
  /* segment list */
  .seglist{display:flex;flex-direction:column;gap:8px}
  .opensnext{margin-top:7px;font-family:var(--mono);font-size:11px;color:var(--blue);font-weight:600}
  .seg{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 10px;box-shadow:var(--shadow)}
  .seg .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .seg .name{font-family:var(--display);font-weight:600;font-size:15px;display:flex;align-items:center;gap:6px}
  .seg .name .emoji{font-size:15px}
  .seg .arrow{font-family:var(--mono);font-size:13px;font-weight:600}
  .seg .mid{display:flex;align-items:center;gap:10px;margin-top:5px;flex-wrap:wrap}
  .pill{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .pill b{color:var(--text);font-weight:600}
  .rivchips{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
  .chip{font-family:var(--mono);font-size:10px;letter-spacing:.02em;color:var(--blue-deep);
    border:1px solid #cfe0ff;border-radius:4px;padding:1px 5px;background:var(--blue-tint)}
  .chip.open{color:var(--faint);background:var(--panel2);border-color:var(--line)}
  /* allocation stepper */
  .alloc{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px;
    border-top:1px dashed var(--line);padding-top:8px}
  .alloc .blurb{font-size:11px;color:var(--faint);line-height:1.3;flex:1}
  .stepper{display:flex;align-items:center;gap:0;flex:none}
  .stepper button{width:30px;height:30px;font-family:var(--mono);font-size:18px;font-weight:600;
    background:var(--panel2);border:1px solid var(--line);color:var(--text);line-height:1}
  .stepper button:first-child{border-radius:6px 0 0 6px}
  .stepper button:last-child{border-radius:0 6px 6px 0}
  .stepper button:not(:disabled):active{background:var(--blue-tint);color:var(--blue-deep)}
  .stepper button:disabled{color:var(--faint);cursor:default}
  .stepper .qty{min-width:52px;text-align:center;font-family:var(--mono);font-size:12px;
    background:var(--panel2);border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    height:30px;display:flex;flex-direction:column;justify-content:center;line-height:1.1}
  .stepper .qty .u{font-size:12px;font-weight:600}
  .stepper .qty .c{font-size:9px;color:var(--blue)}

  /* posture */
  .posture{margin-top:14px}
  .seclbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);
    font-family:var(--mono);margin-bottom:6px}
  .seg3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .pbtn{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 6px;text-align:center;box-shadow:var(--shadow)}
  .pbtn .pl{font-family:var(--display);font-weight:600;font-size:14px}
  .pbtn .pd{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.25}
  .pbtn.on{border-color:var(--blue);background:var(--blue-tint);box-shadow:inset 0 0 0 1px var(--blue)}
  .pbtn.on .pl{color:var(--blue-deep)}

  /* forecast */
  .forecast{margin-top:14px;background:var(--blue-tint);border:1px dashed #b9d2ff;border-radius:8px;padding:10px 12px}
  .forecast .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue-deep);font-family:var(--mono)}
  .forecast .txt{font-size:13px;color:var(--text);margin-top:3px;font-style:italic}
  .forecast .warn{font-size:12px;color:var(--red);margin-top:6px}

  /* run bar */
  .runbar{position:sticky;bottom:0;margin:16px -12px -40px;padding:14px 12px 12px;
    background:linear-gradient(180deg,rgba(233,237,242,0) 0,var(--bg) 18px);}
  .capreadout{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;
    font-family:var(--mono);font-size:12px}
  .capreadout .big{font-size:17px;font-weight:600}
  .btn{display:block;width:100%;text-align:center;border-radius:9px;padding:13px;
    font-family:var(--display);font-weight:600;font-size:16px;letter-spacing:.03em;text-transform:uppercase}
  .btn.primary{background:var(--blue);color:var(--ink);box-shadow:0 2px 8px rgba(31,109,255,.32)}
  .btn.primary:active{filter:brightness(.94)}
  .btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--text);font-size:13px;padding:11px;box-shadow:var(--shadow)}
  .btn[disabled]{opacity:.45;cursor:default;box-shadow:none}
  .actions{display:flex;gap:8px;margin-top:8px}
  .actions .btn{margin:0}

  /* result */
  .result .hero{text-align:center;padding:18px 0 10px}
  .result .heroK{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-family:var(--mono)}
  .result .heroV{font-family:var(--mono);font-weight:600;font-size:46px;line-height:1;margin-top:4px}
  .result .heroSub{font-size:13px;color:var(--muted);margin-top:6px}
  .notes{margin-top:10px;display:flex;flex-direction:column;gap:7px}
  .note{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px;line-height:1.35;box-shadow:var(--shadow)}
  .note.warn{border-left:3px solid var(--red)}
  .note.good{border-left:3px solid var(--green)}
  .note.rival{border-left:3px solid var(--blue)}
  .note .nh{font-family:var(--display);font-weight:600;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:2px}

  /* intro / end */
  .intro{padding:18px 4px 4px}
  .intro .big{font-family:var(--display);font-weight:700;font-size:37px;line-height:1.04;letter-spacing:.005em;text-wrap:balance}
  .intro .big .yr{color:var(--blue);white-space:nowrap}
  .intro .lede{font-size:14px;color:var(--muted);line-height:1.5;margin:14px 0 18px;max-width:42ch}
  .sacred{display:flex;flex-direction:column;gap:11px;margin:0 0 4px;border-top:1px solid var(--line);padding-top:16px}
  .sacred .s{font-size:13px;color:var(--text);line-height:1.45}
  .sacred .s b{color:var(--blue);font-weight:700;letter-spacing:.01em}
  .helplink{display:block;width:100%;text-align:center;margin-top:14px;font-size:13px;font-weight:600;color:var(--blue);background:none}
  .helplink:hover{text-decoration:underline}

  /* how to play */
  .help{padding:6px 2px 4px}
  .help-h h2{font-family:var(--display);font-weight:700;font-size:28px;margin:0 0 5px;letter-spacing:.01em}
  .help-h p{font-size:13.5px;color:var(--muted);margin:0 0 6px;line-height:1.5}
  .help .seclbl{margin-top:18px}
  .help-step{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--line)}
  .help-step .n{flex:none;width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;
    font-family:var(--mono);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .help-step .c .t{font-family:var(--display);font-weight:600;font-size:15px;letter-spacing:.01em}
  .help-step .c .b{font-size:13px;color:var(--muted);line-height:1.45;margin-top:2px}
  .help-rule{display:flex;gap:11px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);
    border-radius:8px;padding:10px 12px;margin-bottom:7px;box-shadow:var(--shadow)}
  .help-rule .ic{font-size:18px;flex:none;line-height:1.25}
  .help-rule .t{font-family:var(--display);font-weight:600;font-size:14px}
  .help-rule .b{font-size:12.5px;color:var(--muted);line-height:1.42;margin-top:1px}
  .help-p{font-size:13.5px;color:var(--muted);line-height:1.5;margin:5px 0 16px}
  .help .btn.primary{margin-top:6px}

  .end .grade{display:flex;align-items:center;gap:14px;justify-content:center;margin:6px 0 2px}
  .end .gbadge{font-family:var(--display);font-weight:700;font-size:54px;width:84px;height:84px;
    display:flex;align-items:center;justify-content:center;border-radius:14px;border:2px solid var(--blue);color:var(--blue);background:var(--blue-tint)}
  .end .gbadge.s{border-color:var(--blue);color:var(--ink);background:var(--blue)}
  .end .gbadge.f{border-color:var(--red);color:var(--red);background:#fdecea}
  .end .rankline{font-family:var(--display);font-size:18px;font-weight:600}
  /* par panel */
  .parbox{margin-top:14px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow)}
  .parhead{display:flex;align-items:baseline;justify-content:space-between;padding:10px 12px;background:var(--blue-tint);border-bottom:1px solid var(--line)}
  .parhead .parbig{font-family:var(--mono);font-size:19px;font-weight:600}
  .parhead .parsub{font-size:11px;color:var(--muted);font-family:var(--mono)}
  .parrow{display:flex;justify-content:space-between;padding:7px 12px;font-family:var(--mono);font-size:12.5px;border-bottom:1px solid var(--line);color:var(--muted)}
  .parrow:last-child{border-bottom:0}
  .parrow.cleared{color:var(--text)} .parrow.cleared .num{color:var(--green);font-weight:600}
  /* end-screen staged reveal */
  .endhead{text-align:center;padding:6px 0 2px}
  .endhead .k{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  .endhead .ttl{font-family:var(--display);font-weight:700;font-size:25px;letter-spacing:.02em;margin-top:2px}
  .standings{margin-top:10px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow)}
  .srow{display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid var(--line);
    opacity:0;transform:translateY(10px);transition:opacity .3s ease,transform .3s ease}
  .srow:last-child{border-bottom:0}
  .srow.in{opacity:1;transform:none}
  .srow.you{background:var(--blue-tint)}
  .srow .pos{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--faint);width:32px;flex:none;text-align:center}
  .srow.you .pos{color:var(--blue-deep)}
  .srow .who{flex:1;font-size:14px}
  .srow.you .who{font-weight:700;color:var(--blue-deep)}
  .srow .v{font-family:var(--mono);font-size:14px;font-weight:600}
  .verdict{text-align:center;margin-top:16px;opacity:0;transform:translateY(10px);transition:opacity .4s ease,transform .4s ease}
  .verdict.in{opacity:1;transform:none}
  .verdict .gbadge2{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:14px;
    border:2px solid var(--blue);background:var(--blue-tint);color:var(--blue);font-family:var(--display);font-weight:700;font-size:38px;margin-bottom:8px}
  .verdict .gbadge2.s{background:var(--blue);color:#fff}
  .verdict .gbadge2.f{border-color:var(--red);color:var(--red);background:#fdecea}
  .verdict .headline{font-family:var(--display);font-weight:600;font-size:18px;line-height:1.22;margin:2px auto;max-width:30ch}
  .verdict .vsub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .verdict .finalval{font-size:30px;font-weight:600;color:var(--blue);margin-top:8px}
  .endrest{opacity:0;transition:opacity .5s ease;margin-top:16px}
  .endrest.in{opacity:1}
  .breakdown{margin-top:14px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow)}
  .brow{display:flex;justify-content:space-between;padding:8px 12px;font-family:var(--mono);font-size:13px;border-bottom:1px solid var(--line)}
  .brow:last-child{border-bottom:0}
  .brow.total{background:var(--panel2);font-weight:600}
  .brow .neg{color:var(--red)}
  .vs{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .vsbox{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 10px;box-shadow:var(--shadow)}
  .vsbox .h{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-family:var(--mono);margin-bottom:5px}
  .vsbox.beat .h{color:var(--green)} .vsbox.lost .h{color:var(--red)}
  .vsbox .nm{font-size:12.5px;line-height:1.5}
  .story{margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-size:13px;line-height:1.4;box-shadow:var(--shadow)}
  .share{margin-top:12px;background:var(--blue-tint);border:1px dashed #b9d2ff;border-radius:8px;padding:11px 12px;font-family:var(--mono);font-size:12px;white-space:pre-wrap;line-height:1.5}

  /* debug */
  .debug{margin-top:20px;border:1px solid #cfe0ff;border-radius:8px;padding:10px;background:var(--blue-tint);font-family:var(--mono);font-size:11px;line-height:1.5}
  .debug h4{margin:0 0 6px;font-family:var(--display);color:var(--blue-deep);font-size:13px}
  .debug table{width:100%;border-collapse:collapse}
  .debug td{padding:1px 4px;border-bottom:1px solid #d4e2fb}
  .debug .num{text-align:right}
  .dbtn{margin-top:8px;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:11px;color:var(--text)}

  .foot{margin-top:20px;text-align:center;font-size:11px;color:var(--faint);line-height:1.4}
  /* ============ Pass 5: motion & ceremony (transform/opacity only) ============ */
  @keyframes my-up{ from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
  @keyframes my-stamp{ 0%{opacity:0;transform:scale(.96)} 60%{opacity:1;transform:scale(1.04)} 100%{transform:scale(1)} }
  @keyframes my-pulse{ 0%{transform:scale(1)} 40%{transform:scale(1.3)} 100%{transform:scale(1)} }
  @keyframes my-flash-blue{ 0%{background:#dbe8ff} 100%{background:var(--panel)} }
  @keyframes my-flash-red{ 0%{background:#fdded9} 100%{background:var(--panel)} }
  @keyframes my-glow{ 0%,100%{box-shadow:0 2px 8px rgba(31,109,255,.3)} 50%{box-shadow:0 5px 20px rgba(31,109,255,.55)} }
  @keyframes my-grade{ 0%{opacity:0;transform:scale(1.45)} 70%{opacity:1;transform:scale(.9)} 100%{transform:scale(1)} }
  @keyframes my-slam{ 0%{opacity:0;transform:translateY(14px) scale(.98)} 100%{opacity:1;transform:none} }
  @keyframes my-wipe{ from{transform:translateX(-110%)} to{transform:translateX(110%)} }
  @keyframes my-nudge-up{ 0%{transform:translateY(0)} 35%{transform:translateY(-5px)} 100%{transform:translateY(0)} }
  @keyframes my-shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
  @keyframes my-floatchip{ 0%{opacity:0;transform:translateY(2px)} 25%{opacity:1} 100%{opacity:0;transform:translateY(-24px)} }

  .anim-up{ animation:my-up .26s cubic-bezier(.2,.7,.2,1) both; }
  .anim-stamp{ animation:my-stamp .3s ease-out both; }
  .pulse-once{ animation:my-pulse .5s ease-out; }
  .flash-blue{ animation:my-flash-blue .9s ease-out; }
  .flash-red{ animation:my-flash-red .9s ease-out; }
  .cta-glow{ animation:my-glow 1.9s ease-in-out infinite; }
  .grade-stamp{ animation:my-grade .5s cubic-bezier(.2,.7,.2,1) both; }
  .slam-in{ animation:my-slam .34s cubic-bezier(.2,.7,.2,1) both; }
  .nudge-up{ animation:my-nudge-up .55s ease-out; }
  .shake{ animation:my-shake .42s ease-out; }

  .launch-wipe{ position:absolute; inset:0; overflow:hidden; border-radius:9px; pointer-events:none; z-index:2 }
  .launch-wipe::after{ content:""; position:absolute; top:0; bottom:0; left:0; width:55%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent); animation:my-wipe .6s ease-in-out forwards }
  .btn.depress{ transform:scale(.97) }

  .checker-wipe{ position:relative; overflow:hidden }
  .checker-wipe::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background-image:linear-gradient(45deg,rgba(0,0,0,.07) 25%,transparent 25%,transparent 75%,rgba(0,0,0,.07) 75%),linear-gradient(45deg,rgba(0,0,0,.07) 25%,transparent 25%,transparent 75%,rgba(0,0,0,.07) 75%);
    background-size:16px 16px; background-position:0 0,8px 8px; transform:translateX(-110%); animation:my-wipe .75s ease-out .05s forwards }

  .floatchip{ position:absolute; font-family:var(--mono); font-weight:700; font-size:13px; color:var(--blue-deep);
    pointer-events:none; z-index:5; animation:my-floatchip .75s ease-out forwards }
  .countflash-up{ color:var(--green)!important } .countflash-down{ color:var(--red)!important }
  .cta-glow-fast{ animation:my-glow 1.15s ease-in-out infinite }
  .cta-glow-faster{ animation:my-glow .7s ease-in-out infinite }
  .warhit{ animation:my-flash-red .9s ease-out, my-shake .42s ease-out }

  /* ============ Pass 6: identity, color, distribution (presentation only) ============ */
  /* segment colour identity — left border, icon badge and your-share pill all carry the hue */
  .seg{ border-left:4px solid var(--seg,var(--line)); }
  .seg .name .emoji{ display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;
    border-radius:6px;background:var(--seg-tint,var(--panel2));font-size:14px;line-height:1 }
  .seg .pill.you b{ color:var(--seg,var(--text)) }
  .seg .battle{ display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap }
  .seg .owner{ font-family:var(--mono);font-size:10.5px;color:var(--muted);display:inline-flex;align-items:center;gap:3px }
  .seg .owner b{ color:var(--text);font-weight:600 }
  .seg .threat{ font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    border-radius:4px;padding:2px 6px;border:1px solid var(--line);margin-left:auto }
  .threat.low{ color:var(--faint);background:var(--panel2) }
  .threat.watch{ color:#9a6a00;background:#fbf0d6;border-color:#f0d99a }
  .threat.war{ color:var(--red);background:#fde6e3;border-color:#f3c3bd }
  /* louder demand read — the arrow is now the loudest element on the row */
  .seg .arrow{ font-size:16px;font-weight:700;letter-spacing:-1px;display:inline-flex;align-items:baseline;gap:2px }
  .seg .arrow .dl{ font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;opacity:.85;margin-left:3px }
  /* value-dominant status cluster */
  .valgauge{ background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:9px;
    padding:9px 14px;display:flex;align-items:baseline;justify-content:space-between;gap:10px;box-shadow:var(--shadow);margin-bottom:6px }
  .valgauge .k{ font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint) }
  .valgauge .v{ font-family:var(--mono);font-size:27px;font-weight:600;color:var(--blue);line-height:1 }
  .cluster3{ display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px }
  /* value sparkline */
  .sparkwrap{ position:relative;margin-bottom:10px }
  .spark{ display:flex;align-items:flex-end;gap:3px;height:40px;padding:18px 10px 8px;
    background:var(--panel);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow) }
  .spark .sb{ flex:1;background:var(--panel2);border-radius:2px 2px 0 0;min-height:3px }
  .spark .sb.on{ background:#bcd3ff }
  .spark .sb.cur{ background:var(--blue) }
  .sparklab{ position:absolute;top:6px;left:12px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint) }
  /* today's briefing */
  .brief{ background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px 14px;margin:16px 0 4px;box-shadow:var(--shadow) }
  .brief .bk{ font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:7px }
  .brief .bmood{ font-size:14px;line-height:1.46;color:var(--text) }
  .brief .brow{ display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line) }
  .brief .blab{ color:var(--faint);font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase }
  .brief .bval{ font-size:13px;font-weight:600;text-align:right }
  .brief .bval .num{ color:var(--blue-deep) }
  /* identity picker */
  .idpick{ margin:16px 0 2px }
  .idgrid{ display:flex;flex-wrap:wrap;gap:6px }
  .idbtn{ flex:1 1 30%;min-width:104px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 9px;text-align:left;box-shadow:var(--shadow) }
  .idbtn .il{ font-family:var(--display);font-weight:600;font-size:13px;line-height:1.1 }
  .idbtn .ib{ font-size:10px;color:var(--muted);line-height:1.25;margin-top:2px }
  .idbtn.on{ border-color:var(--blue);background:var(--blue-tint);box-shadow:inset 0 0 0 1px var(--blue) }
  .idbtn.on .il{ color:var(--blue-deep) }
  /* streak chip + completed banner */
  .streak{ display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--blue-deep);
    background:var(--blue-tint);border:1px solid #cfe0ff;border-radius:20px;padding:3px 11px }
  .donebanner{ display:flex;align-items:center;gap:10px;background:#e7f6ee;border:1px solid #b6e2c8;border-radius:9px;
    padding:10px 12px;margin:0 0 4px;font-size:12.5px;color:#0c6b34;line-height:1.35 }
  .donebanner b{ font-weight:700 }
  /* pre-run warning */
  .prewarn{ background:#fbf0d6;border:1px solid #f0d99a;border-radius:8px;padding:9px 11px;margin-bottom:10px;font-size:12px;color:#7a5500;line-height:1.42 }
  .prewarn b{ color:#5e4200;font-weight:700 }
  .prewarn .pwh{ display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:#9a6a00;margin-bottom:3px }
  /* finale: grade colours + photo finish */
  .gbadge2.gold,.gbadge.gold{ border-color:#c79200;color:#7a5b00;background:#f7eccc }
  .gbadge2.bluegrade,.gbadge.bluegrade{ border-color:var(--blue);color:var(--blue);background:var(--blue-tint) }
  .gbadge2.redgrade,.gbadge.redgrade{ border-color:var(--red);color:var(--red);background:#fdecea }
  .verdict .vco{ font-family:var(--display);font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:3px }
  .photo{ margin-top:0;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px;box-shadow:var(--shadow) }
  .photo .ph{ font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:8px }
  .photo .pbar{ display:flex;align-items:center;gap:8px;margin-top:6px }
  .photo .pname{ width:96px;flex:none;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis }
  .photo .ptrack{ flex:1;height:14px;background:var(--panel2);border-radius:7px;overflow:hidden }
  .photo .pfill{ height:100%;border-radius:7px }
  .photo .pfill.you{ background:var(--blue) } .photo .pfill.them{ background:var(--muted) }
  .photo .pval{ font-family:var(--mono);font-size:11px;font-weight:600;width:56px;text-align:right;flex:none }

  /* ============ Pass 7: car art (cars on screen; one livery palette across board/cards/garage/share) ============ */
  @keyframes my-carrise{ 0%{opacity:0;transform:translateY(22px) scale(.96)} 100%{opacity:1;transform:none} }
  .caro{ display:block;width:100%;height:auto }
  /* louder livery board: thicker accent + livery-tinted header band carrying the inline car */
  .seg{ border-left-width:6px;overflow:hidden }
  .seghead{ display:flex;align-items:center;gap:10px;background:var(--seg-tint);margin:-9px -10px 8px;padding:7px 10px 6px;border-bottom:1px solid var(--line) }
  .segcar{ width:90px;flex:none;border-radius:6px;overflow:hidden;background:linear-gradient(180deg,#1a1c20,#0d0e11);padding:2px 0 0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05) }
  .seghead .name{ flex:1;min-width:0 }
  .seghead .arrow{ flex:none }
  /* launch reveal card (the "card beat") */
  .launchcard{ background:linear-gradient(180deg,#15171c,#0c0d10);border:1px solid var(--line);border-top:3px solid var(--seg,var(--blue));
    border-radius:12px;padding:12px 12px 14px;margin:0 0 14px;box-shadow:0 6px 20px rgba(13,14,16,.22);text-align:center }
  .car-rise{ animation:my-carrise .5s cubic-bezier(.2,.7,.2,1) both }
  .launchcard .lc-k{ font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#9aa3b0;margin-bottom:4px }
  .launchcard .lc-stage{ border-radius:9px;overflow:hidden }
  .launchcard .lc-name{ display:flex;align-items:baseline;justify-content:center;gap:9px;margin-top:9px;flex-wrap:wrap }
  .launchcard .lc-model{ font-family:var(--display);font-weight:700;font-size:21px;color:#fff;letter-spacing:.02em }
  .launchcard .lc-maker{ font-family:var(--mono);font-size:11px;color:#8b94a2;text-transform:uppercase;letter-spacing:.06em }
  .launchcard .lc-specs{ display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-top:9px }
  .launchcard .lc-spec{ font-family:var(--mono);font-size:11px;font-weight:600;color:#dfe4ea;background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:3px 8px }
  /* finale garage + flagship */
  .garage{ margin-bottom:14px }
  .garage-k{ font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;text-align:center }
  /* a swipeable garage: each car renders at a legible fixed height; >3 cars scroll horizontally instead of shrinking */
  .garage-stage{ border-radius:12px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
    box-shadow:0 6px 20px rgba(13,14,16,.2);border:1px solid #0c0d10;background:#0c0d10 }
  .garage-stage svg{ height:104px;width:auto;max-width:none;display:block }
  .garage-hint{ font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);text-align:center;margin-top:5px }
  .flagcard{ background:linear-gradient(180deg,#15171c,#0c0d10);border:1px solid var(--line);border-top:3px solid var(--seg,var(--blue));
    border-radius:12px 12px 0 0;padding:11px 12px 12px;margin-top:12px;text-align:center }
  .flagcard .fc-k{ font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#9aa3b0;margin-bottom:4px }
  .flagcard .fc-stage{ border-radius:9px;overflow:hidden }
  .flagcard .fc-name{ display:flex;align-items:baseline;justify-content:center;gap:8px;margin-top:8px;flex-wrap:wrap }
  .flagcard .fc-model{ font-family:var(--display);font-weight:700;font-size:18px;color:#fff;letter-spacing:.02em }
  .flagcard .fc-maker{ font-family:var(--mono);font-size:10.5px;color:#8b94a2;text-transform:uppercase;letter-spacing:.06em }
  .flagcard + .share{ margin-top:0;border-top-left-radius:0;border-top-right-radius:0 }

  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

<body>
<div id="app"></div>
<script>
(function(){
"use strict";

/* ===== Pass 7: CarArt module (embedded verbatim; parametric recolorable vehicle SVGs) ===== */
/* ===========================================================================
   MODEL YEAR :: CarArt  (parametric vehicle art, runtime-free)
   Extracted from the Claude Design system, stripped of the Design runtime.
   Pure vanilla JS, no dependencies. Generates premium recolorable car SVGs
   from a single livery hex. Drop this whole block into the game's <script>.
   =========================================================================== */
class CarArt {
  // ---------- color math ----------
  clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  hexToRgb(h){ h=h.replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
  rgbToHex(r,g,b){ const f=x=>('0'+Math.round(this.clamp(x,0,255)).toString(16)).slice(-2); return '#'+f(r)+f(g)+f(b); }
  hexToHsl(hex){ let [r,g,b]=this.hexToRgb(hex); r/=255;g/=255;b/=255; const mx=Math.max(r,g,b),mn=Math.min(r,g,b); let h=0,s=0,l=(mx+mn)/2; const d=mx-mn; if(d){ s=l>0.5?d/(2-mx-mn):d/(mx+mn); if(mx===r)h=((g-b)/d+(g<b?6:0)); else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; } return [h,s*100,l*100]; }
  hslToHex(h,s,l){ h=(h%360+360)%360; s=this.clamp(s,0,100)/100; l=this.clamp(l,0,100)/100; const k=n=>(n+h/30)%12; const a=s*Math.min(l,1-l); const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1))); return this.rgbToHex(f(0)*255,f(8)*255,f(4)*255); }
  mix(hex,hex2,t){ const a=this.hexToRgb(hex),b=this.hexToRgb(hex2); return this.rgbToHex(a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t); }
  hexA(hex,al){ const c=this.hexToRgb(hex); return 'rgba('+c[0]+','+c[1]+','+c[2]+','+al+')'; }
  lum(hex){ const c=this.hexToRgb(hex).map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);}); return 0.2126*c[0]+0.7152*c[1]+0.0722*c[2]; }

  // THE RECIPE: one livery value -> everything
  derive(hex){ const [h,s,l]=this.hexToHsl(hex); return {
    top: this.hslToHex(h, s-8,  l+16),   // key-lit top stop
    mid: hex,                            // true livery
    bot: this.hslToHex(h, s+6,  l-22),   // shadowed lower body
    rim: this.mix(hex,'#ffffff',0.78),   // near-white rim-light edge
    cal: this.hslToHex(h, s+14, l+8),    // brake caliper accent
  }; }

  // ---------- shared wheel (neutral alloy + livery caliper) ----------
  wheel(cx,cy,r,cal,uid){
    const ri=r*0.2, ro=r*0.66; let spk='';
    for(let k=0;k<5;k++){ const a=(k*72-90)*Math.PI/180;
      for(const dg of [-8,8]){ const aa=a+dg*Math.PI/180;
        spk+=`<line x1="${(cx+Math.cos(aa)*ri).toFixed(1)}" y1="${(cy+Math.sin(aa)*ri).toFixed(1)}" x2="${(cx+Math.cos(aa)*ro).toFixed(1)}" y2="${(cy+Math.sin(aa)*ro).toFixed(1)}" stroke="url(#rm${uid})" stroke-width="${(r*0.085).toFixed(2)}" stroke-linecap="round"/>`; } }
    const c0=32*Math.PI/180, c1=86*Math.PI/180, rc=r*0.5;
    const cp=`M${(cx+Math.cos(c0)*rc).toFixed(1)},${(cy+Math.sin(c0)*rc).toFixed(1)} A${rc.toFixed(1)},${rc.toFixed(1)} 0 0 1 ${(cx+Math.cos(c1)*rc).toFixed(1)},${(cy+Math.sin(c1)*rc).toFixed(1)}`;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#ti${uid})"/>`
      +`<circle cx="${cx}" cy="${cy}" r="${(r*0.8).toFixed(1)}" fill="#0d0e11"/>`
      +`<circle cx="${cx}" cy="${cy}" r="${(r*0.58).toFixed(1)}" fill="#2f3338"/>`
      +`<path d="${cp}" stroke="${cal}" stroke-width="${(r*0.14).toFixed(2)}" fill="none" stroke-linecap="round"/>`
      +spk
      +`<circle cx="${cx}" cy="${cy}" r="${(r*0.68).toFixed(1)}" fill="none" stroke="url(#rm${uid})" stroke-width="${(r*0.08).toFixed(2)}"/>`
      +`<circle cx="${cx}" cy="${cy}" r="${(r*0.21).toFixed(1)}" fill="url(#rm${uid})"/>`
      +`<circle cx="${cx}" cy="${cy}" r="${(r*0.08).toFixed(1)}" fill="#1c1e22"/>`;
  }

  bottom(b){ const a=b.archR, cy=100, dx=Math.sqrt(Math.max(1,a*a-(b.sill-cy)*(b.sill-cy)));
    const fl=(b.fw+dx).toFixed(1), fr=(b.fw-dx).toFixed(1), rl=(b.rw+dx).toFixed(1), rr=(b.rw-dx).toFixed(1);
    return `L${fl},${b.sill} A${a},${a} 0 0 0 ${fr},${b.sill} L${rl},${b.sill} A${a},${a} 0 0 0 ${rr},${b.sill} L${b.rearEnd},${b.sill} Z`; }

  // ---------- one car, no stage (origin in 0..340 frame, hub y=100, ground y=118) ----------
  carArt(type,hex,uid){
    const d=this.derive(hex), b=this.BODIES[type];
    const defs=`<defs>`
      +`<linearGradient id="bg${uid}" x1="0" y1="${b.y1}" x2="0" y2="${b.sill+8}" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="${d.top}"/><stop offset="0.5" stop-color="${d.mid}"/><stop offset="0.86" stop-color="${d.mid}"/><stop offset="1" stop-color="${d.bot}"/></linearGradient>`
      +`<linearGradient id="gl${uid}" x1="0" y1="${b.y1}" x2="0" y2="${b.sill}" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#eef5fc"/><stop offset="0.4" stop-color="#aecae6"/><stop offset="0.52" stop-color="#5d83a6"/><stop offset="0.56" stop-color="#7ea4c6"/><stop offset="0.72" stop-color="#bdd6ec"/><stop offset="1" stop-color="#e7f1fa"/></linearGradient>`
      +`<radialGradient id="ti${uid}" cx="0.4" cy="0.36" r="0.72"><stop offset="0" stop-color="#3a3e44"/><stop offset="1" stop-color="#101114"/></radialGradient>`
      +`<radialGradient id="rm${uid}" cx="0.4" cy="0.34" r="0.85"><stop offset="0" stop-color="#f1f4f8"/><stop offset="0.55" stop-color="#b6bcc5"/><stop offset="1" stop-color="#6f757e"/></radialGradient>`
      +`<linearGradient id="hl${uid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbfdff"/><stop offset="1" stop-color="#b6d0e8"/></linearGradient>`
      +`<linearGradient id="tlg${uid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff6a52"/><stop offset="1" stop-color="#9c1d18"/></linearGradient>`
      +`<filter id="bl${uid}" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="2.4"/></filter>`
      +this.wheelDefs(uid+'f')+this.wheelDefs(uid+'r')
      +`</defs>`;
    const body=`<path d="${b.top} ${this.bottom(b)}" fill="url(#bg${uid})"/>`;
    const extra=b.extra?b.extra(d,b,this):'';
    const sheen=`<path d="${b.rim}" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.12" filter="url(#bl${uid})"/>`;
    const glass=`<path d="${b.win}" fill="url(#gl${uid})"/>`;
    const pillar=b.pillar?`<path d="${b.pillar}" fill="none" stroke="${d.bot}" stroke-width="2.6" opacity="0.9" stroke-linecap="round"/>`:'';
    const rim=`<path d="${b.rim}" fill="none" stroke="${d.rim}" stroke-width="1.4" opacity="0.95" stroke-linecap="round" stroke-linejoin="round"/>`;
    const detail=this.detailLayer(b,d,uid);
    const wheels=this.wheel(b.fw,100,b.wr,d.cal,uid+'f')+this.wheel(b.rw,100,b.wr,d.cal,uid+'r');
    return defs+body+sheen+extra+detail.body+glass+pillar+detail.top+rim+wheels;
  }

  // rugged dark wheel-arch cladding (SUV / pickup) — a thick arc hugging each arch
  cladding(b,d){ const r=b.archR+2.5, cy=100, dx=Math.sqrt(Math.max(1,r*r-(b.sill-cy)*(b.sill-cy)));
    const arc=(cx)=>`<path d="M${(cx-dx).toFixed(1)},${b.sill} A${r},${r} 0 0 1 ${(cx+dx).toFixed(1)},${b.sill}" fill="none" stroke="#15171c" stroke-width="5" opacity="0.85"/>`;
    return arc(b.rw)+arc(b.fw); }

  detailLayer(b,d,uid){
    const dn=b.dnose, dt=b.dtail, by=b.belt;
    let lo='', hi='';
    // rocker / sill accent (between wheels)
    lo+=`<line x1="${b.rw+b.archR}" y1="${b.sill-2}" x2="${b.fw-b.archR}" y2="${b.sill-2}" stroke="${d.bot}" stroke-width="3" opacity="0.5" stroke-linecap="round"/>`;
    // character line (highlight) + lower crease (shadow)
    lo+=`<path d="${b.belt2||('M'+dt+','+by+' L'+dn+','+(by-1.5))}" fill="none" stroke="${d.rim}" stroke-width="1.3" opacity="0.55" stroke-linecap="round"/>`;
    lo+=`<line x1="${dt+8}" y1="${by+9}" x2="${dn-7}" y2="${by+8}" stroke="${d.bot}" stroke-width="1.1" opacity="0.4"/>`;
    // door cut lines
    (b.doors||[]).forEach(x=>{ lo+=`<line x1="${x}" y1="${by-7}" x2="${x}" y2="${b.sill-3}" stroke="${d.bot}" stroke-width="1" opacity="0.45"/>`; });
    // door handle
    if(b.handle){ lo+=`<line x1="${b.handle[0]-4.5}" y1="${b.handle[1]}" x2="${b.handle[0]+4.5}" y2="${b.handle[1]}" stroke="${d.bot}" stroke-width="2.2" opacity="0.85" stroke-linecap="round"/>`; }
    // front fascia / intake
    if(b.intake){ const [ix,iy,iw,ih]=b.intake; hi+=`<path d="M${ix},${iy} L${ix-iw},${iy} L${ix-iw+2},${iy+ih} L${ix-2},${iy+ih} Z" fill="#0c0d10" opacity="0.55"/>`; }
    // headlight
    if(b.hl){ const [x,y,w,h]=b.hl; hi+=`<path d="M${x},${y} L${x-w},${y+0.5} L${x-w+1},${y+h} L${x-1},${y+h-0.5} Z" fill="url(#hl${uid})" stroke="${d.bot}" stroke-width="0.5" opacity="0.95"/>`; }
    // taillight
    if(b.tl){ const [x,y,w,h]=b.tl; hi+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="1.6" fill="#2a120f"/><rect x="${x+0.7}" y="${y+0.9}" width="${w-1.4}" height="${h-1.8}" rx="1.2" fill="url(#tlg${uid})" opacity="0.92"/>`; }
    // side mirror (on A-pillar, points forward)
    if(b.mirror){ const [mx,my]=b.mirror; hi+=`<path d="M${mx},${my} l7,-0.5 l1,4 l-7,1 z" fill="${d.mid}" stroke="${d.rim}" stroke-width="0.6"/><line x1="${mx}" y1="${my+1}" x2="${mx-3}" y2="${my+2}" stroke="${d.bot}" stroke-width="1.4"/>`; }
    return { body:lo, top:hi };
  }

  // wheel uses ti/rm with uid+'f' / uid+'r' ids -> need defs per wheel; regenerate small defs
  wheelDefs(uid){ return `<radialGradient id="ti${uid}" cx="0.4" cy="0.36" r="0.72"><stop offset="0" stop-color="#3a3e44"/><stop offset="1" stop-color="#101114"/></radialGradient><radialGradient id="rm${uid}" cx="0.4" cy="0.34" r="0.85"><stop offset="0" stop-color="#f1f4f8"/><stop offset="0.55" stop-color="#b6bcc5"/><stop offset="1" stop-color="#6f757e"/></radialGradient>`; }

  // ---------- stage-wrapped single car (for cards & recolor strip) ----------
  stageSVG(type,hex,uid){
    const stDefs=`<defs><radialGradient id="st${uid}" cx="0.5" cy="0.4" r="0.72"><stop offset="0" stop-color="#2b303a"/><stop offset="0.55" stop-color="#15171c"/><stop offset="1" stop-color="#090a0c"/></radialGradient>`
      +`<linearGradient id="fd${uid}" x1="0" y1="118" x2="0" y2="150" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#0a0b0d" stop-opacity="0"/><stop offset="1" stop-color="#0a0b0d" stop-opacity="0.98"/></linearGradient></defs>`;
    return `<svg viewBox="0 0 340 150" width="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">`
      +stDefs
      +`<rect x="0" y="0" width="340" height="150" fill="url(#st${uid})"/>`
      +`<ellipse cx="170" cy="119" rx="150" ry="8" fill="#000" opacity="0.45"/>`
      +`<g transform="matrix(1 0 0 -1 0 237)" opacity="0.16">${this.carArt(type,hex,uid+'R')}</g>`
      +`<rect x="0" y="118" width="340" height="32" fill="url(#fd${uid})"/>`

  lineup(list){

      cars+=`<g transform="translate(${tx},0)">${this.carArt(m.type,m.hex,uid)}</g>`;
    });
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">`
      +`<defs><radialGradient id="stL" cx="0.5" cy="0.32" r="0.85"><stop offset="0" stop-color="#2b303a"/><stop offset="0.6" stop-color="#131519"/><stop offset="1" stop-color="#08090b"/></radialGradient>`

      +`<rect x="0" y="0" width="${W}" height="${H}" fill="url(#stL)"/>`
      +shad+refl
      +`<rect x="0" y="118" width="${W}" height="32" fill="url(#fdL)"/>`
      +cars
      +`</svg>`;
  }

  recipeRows(){

    const row=(k,note,col)=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px"><span style="width:34px;height:18px;border-radius:4px;flex:none;background:${col};border:1px solid rgba(255,255,255,.1)"></span><span style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#cfd3db;width:62px">${k}</span><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#7c828d">${note}</span></div>`;

  demoHex(){ const t=this.bodyFromLabel(this.props.demoBody||'Sports coupe'); const m=this.MODELS.find(x=>x.type===t); return m?m.hex:'#E5392F'; }

    const demoLabel = this.props.demoBody||'Sports coupe';

    const models = this.MODELS.map(m=>{ const d=this.derive(m.hex); return Object.assign({},m,{
      car:{__html:this.stageSVG(m.type,m.hex,m.id)},

    return {
      models, showLabels, demoLabel, catalog,
      recolorStrip,
      lineupCount: count,
      lineup:{__html:this.lineup(this.MODELS.slice(0,count))},
      recipeRows:{__html:this.recipeRows()},

  }

/* =========================================================================
   MODEL YEAR — Phase 1 (the playable engine).
   Single self-contained page, vanilla JS, no backend. Every tunable number
   lives in CONFIG. The three sacred mechanics are: contested share (revenue is
   a slice of a shared pool), telegraphed rival reactions (a price war is warned
   the year before it bites), and telegraphed events (a vague forecast a year
   ahead, ~70% true). See section 6 of the brief for the exact math.
   ========================================================================= */

var CONFIG = {
  debug: /[?&]debug=1\b/.test(location.search),
  turns: 10,

  /* starting state */
  startCash: 5000,            // $M  (displays as $5.0B)
  startBrand: 50,             // 0..100

/* ============================ helpers ============================ */
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function hashString(str){ var h=2166136261>>>0; for(var i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);} return h>>>0; }
function mulberry32(seed){ var a=seed>>>0; return function(){ a|=0;a=(a+0x6d2b79f5)|0; var t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
function rngFromSeed(s){ return mulberry32(hashString(s)); }
function pickWeighted(rng,obj){ var total=0,k; for(k in obj) total+=obj[k]; var r=rng()*total; for(k in obj){ r-=obj[k]; if(r<=0) return k; } return k; }

// money in $M -> "$5.0B" / "$320M" / "-$1.2B"
function fmtMoney(v){
  var sign = v<0 ? "-" : "", a=Math.abs(v);
  if(a>=1000) return sign+"$"+(a/1000).toFixed(1)+"B";
  return sign+"$"+Math.round(a)+"M";
}
function fmtSigned(v){ return (v>=0?"+":"")+fmtMoney(v); }
function pct(x){ return Math.round(x*100)+"%"; }

/* ============================ scenario (seed-fixed) ============================ */
// The whole day's run is decided here so it is identical for everyone on a seed.
function buildScenario(seed){
  var rng = rngFromSeed("scenario|"+seed);
  // Each seed gets an "era": one or two events are far more likely this decade, so
  // the day has a character (a truck era, an EV era, a recessionary decade). That is
  // what lets a committed specialist win on the days that favor it, instead of a
  // forecast-chaser winning every seed. Quiet is excluded as an era theme.
  var themeDeck = EVENT_DECK.filter(function(e){ return e!=="quiet"; });
  var eraA = themeDeck[Math.floor(rng()*themeDeck.length)];
  var eraB = themeDeck[Math.floor(rng()*themeDeck.length)];
  var weights = {}; EVENT_DECK.forEach(function(e){ weights[e]=1; });
  weights[eraA] += CONFIG.eraBias; weights[eraB] += CONFIG.eraBias;
  var events=[], severities=[];
  var sw0=CONFIG.severityWeights;
  for(var i=0;i<CONFIG.turns;i++){
    events.push(pickWeighted(rng, weights));
    // rising stakes: tilt the severity draw toward mild early, toward severe late (seed-deterministic)
    var t = CONFIG.turns>1 ? i/(CONFIG.turns-1) : 1;
    var sw = { mild: sw0.mild*(1+CONFIG.stakesCurve*(1-t)), medium: sw0.medium, severe: sw0.severe*(1+CONFIG.stakesCurve*t) };
    severities.push(pickWeighted(rng, sw));
  }
  // forecast shown in year i is a hint about year i+1; ~70% true, else a red herring
  var forecastTrue=[], forecastEvent=[];
  for(i=0;i<CONFIG.turns-1;i++){
    var truthful = rng() < CONFIG.forecastTrueChance;
    forecastTrue.push(truthful);
    if(truthful){ forecastEvent.push(events[i+1]); }
    else {
      var others = EVENT_DECK.filter(function(e){ return e!==events[i+1]; });
      forecastEvent.push(others[Math.floor(rng()*others.length)]);
    }
  }
  return { seed:seed, events:events, severities:severities, forecastTrue:forecastTrue, forecastEvent:forecastEvent, era:[eraA,eraB] };
}

    ents.push(e);

}
function createState(seed){
  var pending={}; SEG_IDS.forEach(function(s){ pending[s]=1; });
  return {
    seed:seed, scenario:buildScenario(seed), entities:freshEntities(),
    pending:pending, yearIndex:0, history:[], playerPosture:"standard",

// Delayed capacity: a year's build is bought into pendingCap and only comes online
// at the START of the next model year. This is what makes the forecast matter — you
// must commit a year ahead under uncertainty instead of reacting risk-free.
function activatePending(state){
  state.entities.forEach(function(e){
    SEG_IDS.forEach(function(s){
      if(e.pendingCap[s]){ e.capacity[s]=(e.capacity[s]||0)+e.pendingCap[s]; e.pendingCap[s]=0; }
    });
  });
}

/* ============================ market math (section 6) ============================ */
function eventMultiplier(eventId,severity,segId){
  var def=EVENTS[eventId], base=(def.demand&&def.demand[segId]!=null)?def.demand[segId]:1;
  return 1 + (base-1)*CONFIG.severityFactor[severity];
}
function opCostMultiplier(eventId,severity,segId){
  var def=EVENTS[eventId], base=(def.opcost&&def.opcost[segId]!=null)?def.opcost[segId]:1;
  return 1 + (base-1)*CONFIG.severityFactor[severity];
}
function brandFactor(brand){ return CONFIG.brandFloorFactor + brand/CONFIG.brandFactorDiv; }
function homeBonus(entity,segId){ return entity.home.indexOf(segId)>=0 ? CONFIG.homeBonusValue : 1; }
function effectiveCapacity(entity,segId){
  var ap=CONFIG.postures[entity.posture].appeal;
  return (entity.capacity[segId]||0) * ap * brandFactor(entity.brand) * homeBonus(entity,segId);
}

// Demand pool for a segment this year. Sacred mechanic 1 lives in the share split below.
function demandPool(state,segId,yearIndex){
  var seg=segMeta(segId);
  var ev=state.scenario.events[yearIndex], sev=state.scenario.severities[yearIndex];
  var drift = segId==="ev" ? (1 + yearIndex*CONFIG.secularDriftEV) : 1;
  var em = eventMultiplier(ev,sev,segId);
  // the final model year is the decade-definer: amplify the SWING (deviation from 1), not the
  // flat pool — so backing the right segment wins big and the wrong one craters (rewards commitment).
  if(yearIndex===CONFIG.turns-1) em = 1 + (em-1)*CONFIG.finaleAmplifier;
  return seg.basePool * CONFIG.poolUnit * em * drift * (state.pending[segId]||1);
}

// Rivals grow capacity on a bounded deterministic schedule (rule-based, seed-free):
// faster in their home segments, slowly everywhere. Like the player, their build is
// delayed — it goes into pendingCap and opens next year. They pay from cash so their
// valuation stays honest for the final ranking.
function rivalInvest(entity){
  if(entity.isPlayer) return;
  SEG_IDS.forEach(function(s){
    var g = entity.home.indexOf(s)>=0 ? CONFIG.rivalHomeGrowth : CONFIG.rivalOffGrowth;
    var add = (entity.capacity[s]||0)*g;
    entity.pendingCap[s] = (entity.pendingCap[s]||0) + add;   // opens next year
    entity.cash -= add*CONFIG.capacityCostPerUnit;
  });
}

// Seed-deterministic personal event for one entity-year. Recall scales with a Budget
// streak, viral with a Premium streak / high brand. Modest magnitude; applies to all
// entities (bots included) so the daily stays comparable. Mutates the entity.
function rollPersonalEvent(state,e,y){
  var r=rngFromSeed(state.seed+"|pe|"+e.id+"|"+y)();
  var recallP=Math.min(CONFIG.recallMaxProb, CONFIG.recallProbPerBudgetYr*(e.budgetStreak||0));
  var viralP =Math.min(CONFIG.viralMaxProb, CONFIG.viralProbPerPremiumYr*(e.premiumStreak||0) + (e.brand>=CONFIG.viralBrandFloor?CONFIG.viralBonusProb:0));
  if(r < recallP){ e.brand=clamp(e.brand-CONFIG.recallBrandHit,1,100); e.cash-=CONFIG.recallCashHit; return {type:"recall", cashDelta:-CONFIG.recallCashHit}; }
  if(r > 1-viralP){ e.brand=clamp(e.brand+CONFIG.viralBrandBump,1,100); return {type:"viral", cashDelta:0}; }
  return null;
}

// Resolve the model year at state.yearIndex. Player capacity/cash for this year's
// build must already be applied by the caller. Mutates state; returns a summary.
function resolveYear(state){
  var y=state.yearIndex, ents=state.entities;
  var ev=state.scenario.events[y], sev=state.scenario.severities[y];

  // rivals build first (deterministic), then the market is contested
  ents.forEach(rivalInvest);

  var pools={}, sumEff={};
  SEG_IDS.forEach(function(s){
    pools[s]=demandPool(state,s,y);
    var tot=0; ents.forEach(function(e){ tot+=effectiveCapacity(e,s); });
    sumEff[s]=tot;
  });

  var playerProfit=0, playerSeg={}, playerPE=null;
  ents.forEach(function(e){
    var post=CONFIG.postures[e.posture], total=0;
    e.lastSeg={};
    SEG_IDS.forEach(function(s){
      var seg=segMeta(s);
      var share = sumEff[s]>0 ? effectiveCapacity(e,s)/sumEff[s] : 0;
      var gross = share * pools[s];
      var margin = seg.baseMargin * post.marginMod;
      var opCost = (e.capacity[s]||0) * CONFIG.opCostPerUnit * opCostMultiplier(ev,sev,s);
      var profit = gross*margin - opCost;
      e.lastSeg[s] = { share:share, gross:gross, profit:profit, capacity:e.capacity[s]||0 };
      total += profit;
    });
    var net = total - CONFIG.companyOverhead;   // debt is 0 in Phase 1
    e.cash += net;
    e.brand = clamp(e.brand + post.brandDelta, 1, 100);
    // posture streaks + seed-deterministic personal event (recall / viral), all entities
    e.budgetStreak  = (e.posture==="budget")  ? (e.budgetStreak||0)+1  : 0;
    e.premiumStreak = (e.posture==="premium") ? (e.premiumStreak||0)+1 : 0;
    var pe = rollPersonalEvent(state, e, y);
    if(e.isPlayer){ playerProfit = net + (pe?pe.cashDelta:0); playerSeg=e.lastSeg; playerPE=pe; }
  });

  // Sacred mechanic 2: visible, telegraphed rival reactions. TWO triggers, both
  // bite NEXT year (shrink that pool) and both are surfaced now as a market note:
  //   - dominance: player share in a segment is above dominanceThreshold (price war)
  //   - watchlist: player POURS new capacity (> rivalAlarmBuildUnits) into a rival's
  //     home segment this year, even while still below the share threshold.
  var notes=[], warnings=[], nextPending={};
  SEG_IDS.forEach(function(s){ nextPending[s]=1; });
  var pBuild = player(state).pendingCap;   // this year's player build (delayed), set by the caller
  SEG_IDS.forEach(function(s){
    var sh = playerSeg[s] ? playerSeg[s].share : 0;
    var dominate = sh > CONFIG.dominanceThreshold;
    var alarm = (pBuild[s]||0) > CONFIG.rivalAlarmBuildUnits;
    if(!dominate && !alarm) return;
    var seg=segMeta(s), def=rivalMeta(seg.defender), rivEnt=null;
    for(var i=0;i<ents.length;i++) if(ents[i].id===seg.defender){ rivEnt=ents[i]; break; }
    nextPending[s] = 1 - CONFIG.priceCutPenalty;
    if(rivEnt) rivEnt.pendingCap[s] = (rivEnt.pendingCap[s]||0) + (rivEnt.capacity[s]||0)*CONFIG.reactionCapacityBump; // defends next year
    if(dominate){
      warnings.push({ seg:s, kind:"war",
        text:def.city+" starts "+WAR_PHRASE[s]+" price war. Your "+seg.name+" profits get squeezed next year." });
    } else {
      warnings.push({ seg:s, kind:"watch",
        text:def.city+" spots you tooling up in "+seg.name+" and is gearing up to defend. That pool tightens next year." });
    }
  });
  state.pending = nextPending;

  // capacity decay for everyone (replaces Retool)
  ents.forEach(function(e){ SEG_IDS.forEach(function(s){ e.capacity[s] = (e.capacity[s]||0)*(1-CONFIG.capacityDecay); }); });

  // record player history (drives the honest end screen)
  var p=player(state);
  var segLog={};
  SEG_IDS.forEach(function(s){ segLog[s] = { capacity:p.lastSeg[s].capacity, share:p.lastSeg[s].share, profit:p.lastSeg[s].profit, alloc:(state.planned[s]||0) }; });
  state.history.push({
    year:y, event:ev, severity:sev, posture:p.posture,
    profit:playerProfit, cashAfter:p.cash, brandAfter:p.brand, seg:segLog,
    warnings:warnings.slice(),
  });

  return { profit:playerProfit, segProfit:playerSeg, notes:notes, warnings:warnings, pools:pools, personal:playerPE };
}

/* ============================ valuation / rank ============================ */
function idlePenalty(entity){
  var pen=0;
  SEG_IDS.forEach(function(s){
    if(entity.lastSeg[s] && entity.lastSeg[s].profit<0) pen += (entity.capacity[s]||0)*CONFIG.idlePenaltyPerUnit;
  });
  return pen;
}
function capacityValue(entity){
  var v=0; SEG_IDS.forEach(function(s){ v += (entity.capacity[s]||0)*segMeta(s).capValue; }); return v;
}
function valuation(entity){
  return entity.cash + capacityValue(entity) + entity.brand*CONFIG.brandValue - idlePenalty(entity);
}
function valuationBreakdown(entity){
  return {
    cash:entity.cash, capacity:capacityValue(entity), brand:entity.brand*CONFIG.brandValue,
    idle:-idlePenalty(entity), total:valuation(entity),
  };
}
function rankings(state){
  return state.entities.map(function(e){ return { e:e, v:valuation(e) }; })
    .sort(function(a,b){ return b.v-a.v; });
}
function playerRank(state){
  var r=rankings(state); for(var i=0;i<r.length;i++) if(r[i].e.isPlayer) return i+1; return r.length;
}
function gradeFor(rank,total,fieldSize){
  if(total<=0) return {g:"F",cls:"f"};
  if(rank===1) return {g:"S",cls:"s"};
  if(rank<=2) return {g:"A",cls:""};
  if(rank<=3) return {g:"B",cls:""};
  if(rank<=Math.ceil(fieldSize/2)) return {g:"C",cls:""};
  return {g:"D",cls:""};
}

function el(tag,props,kids){

/* ---- Pass 5 motion helpers (transform/opacity only; reduced-motion safe) ---- */
function reduced(){ return prefersReducedMotion(); }
// Tween a number from->to over ms with ease-out, writing fmt(value) each frame.
function animateCount(node, from, to, ms, fmt){
  fmt = fmt || function(v){ return String(Math.round(v)); };
  if(!node) return;
  if(reduced() || ms<=0 || from===to){ node.textContent=fmt(to); return; }
  var t0=null, done=false;
  function finish(){ if(done) return; done=true; node.textContent=fmt(to); }
  function step(ts){
    if(done) return;
    if(t0===null) t0=ts;
    var t=Math.min(1,(ts-t0)/ms), e=1-Math.pow(1-t,3);
    node.textContent=fmt(from+(to-from)*e);
    if(t<1) requestAnimationFrame(step); else finish();
  }
  requestAnimationFrame(step);
  setTimeout(finish, ms+80);   // safety net: guarantee the final value even if rAF is throttled
}
// FLIP: run doReorder() (which rearranges container's children), then slide each child
// from its old position to its new one with a transform. Same nodes must persist.
function flipReorder(container, doReorder){
  if(reduced()){ doReorder(); return; }
  var kids=[].slice.call(container.children), first=kids.map(function(k){ return k.getBoundingClientRect().top; });
  doReorder();
  var now=[].slice.call(container.children);
  now.forEach(function(k){ var i=kids.indexOf(k); if(i<0) return; var dy=first[i]-k.getBoundingClientRect().top; if(!dy) return; k.style.transition="none"; k.style.transform="translateY("+dy+"px)"; });
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    now.forEach(function(k){ k.style.transition="transform .5s cubic-bezier(.2,.7,.2,1)"; k.style.transform=""; });
  }); });
}
// Apply staggered enter animation to a freshly mounted view's children.
function staggerIn(view, opts){
  if(reduced()||!view) return;
  opts=opts||{};
  var step=opts.step||40, i=0;
  [].forEach.call(view.children, function(c){
    if(c.classList.contains("event")) { i++; return; }    // the event banner stamps in on its own
    c.classList.add("anim-up"); c.style.animationDelay=(i*step)+"ms"; i++;
  });
  var list=view.querySelector(".seglist");
  if(list){ var j=0; [].forEach.call(list.children,function(seg){ seg.classList.add("anim-up"); seg.style.animationDelay=((i+ j)*0+ (3*step)+(j*step))+"ms"; j++; }); }
}

// Build a deterministic model identity for a launch in a segment in a given year.
function modelIdentity(state, segId, y){
  var seg=segMeta(segId), rng=rngFromSeed(state.seed+"|model|"+segId+"|"+y);
  var pool=MODEL_NAMES[segId]||["Mark"], name=pool[Math.floor(rng()*pool.length)];
  var sp=MODEL_SPEC[segId], power=Math.round(sp.power[0]+rng()*(sp.power[1]-sp.power[0]));
  var zero=(sp.zero[0]+rng()*(sp.zero[1]-sp.zero[0])).toFixed(1);
  var price=Math.round(sp.price[0]+rng()*(sp.price[1]-sp.price[0]));
  var specs=[power+" hp"];
  if(segId==="pickup"){ var tow=Math.round((sp.tow[0]+rng()*(sp.tow[1]-sp.tow[0]))/100)*100; specs.push(tow.toLocaleString()+" lb tow"); }
  else if(segId==="ev"){ specs.push(zero+"s 0–60"); specs.push("instant torque"); }
  else { specs.push(zero+"s 0–60"); }
  specs.push("$"+price+"k");
  return { seg:segId, body:seg.body, livery:seg.color, name:name, specs:specs, power:power, zero:zero, price:price, year:y };

function statusCluster(){
  var s=App.state, p=player(s);
  var cash=p.cash, val=valuation(p);
  var prev=App.prevStats||{cash:cash,value:val};
  var late = s.yearIndex>=CONFIG.turns-3;   // snappier numbers in the closing years
  var ms = late?380:600;
  var cashV=el("div",{class:"v num",text:fmtMoney(prev.cash)});
  var valV =el("div",{class:"v num",text:fmtMoney(prev.value)});
  animateCount(valV,  prev.value, val, ms, fmtMoney);
  animateCount(cashV, prev.cash, cash, ms, fmtMoney);
  App.prevStats={cash:cash,value:val};
  var flash = App.recallFlash ? " flash-red" : ""; App.recallFlash=false;   // a recall last year flashes the scoreboard red
  // Value is the dominant gauge; Year / Cash / Rank ride below it.
  return el("div",{},[
    el("div",{class:"valgauge"+flash},[ el("div",{class:"k",text:"Company value"}), valV ]),
    el("div",{class:"cluster3"},[
      gauge("Year",(s.yearIndex+1)+" / "+CONFIG.turns,"year"),

function gauge(k,v,cls){
  return el("div",{class:"gauge "+(cls||"")},[ el("div",{class:"k",text:k}), el("div",{class:"v num",text:v}) ]);
}
function gaugeNode(k,vNode,cls){
  return el("div",{class:"gauge "+(cls||"")},[ el("div",{class:"k",text:k}), vNode ]);
}
// The nemesis: the rival nearest the player in valuation, tiebreaking toward one whose
// home is the player's strongest lane. Re-evaluated every year so the chase stays live.
function nemesisFor(state){
  var p=player(state), pv=valuation(p);
  var strongest=SEG_IDS[0],mx=-1; SEG_IDS.forEach(function(sg){ if((p.capacity[sg]||0)>mx){mx=p.capacity[sg]||0;strongest=sg;} });
  var best=null,bestScore=Infinity;
  state.entities.forEach(function(e){
    if(e.isPlayer) return;
    var score=Math.abs(valuation(e)-pv) - (e.home.indexOf(strongest)>=0?0.001:0);  // tiny nudge toward a lane rival
    if(score<bestScore){ bestScore=score; best=e; }
  });
  return best;
}
// One line before the board: did last year's bet pay off? Uses history + this year's event.
function forecastBeat(state,y){
  if(y<=0) return null;
  var actual=state.scenario.events[y], sev=state.scenario.severities[y];
  var evName=EVENTS[actual].name.toLowerCase();
  var prev=state.history[y-1];
  // the player's biggest build last year (it opens this year)
  var bigSeg=null,bigU=0; if(prev){ SEG_IDS.forEach(function(sg){ var u=prev.seg[sg].alloc||0; if(u>bigU){bigU=u;bigSeg=sg;} }); }
  if(!bigSeg) return { tone:"flat", seg:null, text:"You sat out last year's build. The "+evName+" lands with your lineup unchanged." };
  var m=eventMultiplier(actual,sev,bigSeg), nm=segMeta(bigSeg).name;
  var calledIt = state.scenario.forecastTrue[y-1];
  if(m>1.08) return { tone:"good", seg:bigSeg, text:"Your new "+nm+" capacity opens right as the "+evName+" hits"+(calledIt?" — you called it":"")+". Perfect timing." };
  if(m<0.92) return { tone:"bad", seg:bigSeg, text:"Your fresh "+nm+" line opens into the teeth of the "+evName+". Brutal timing." };
  return { tone:"flat", seg:bigSeg, text:"Your "+nm+" build comes online into a "+evName+" that barely moves it." };
}
function nemesisBanner(state,y){
  var nem=nemesisFor(state); if(!nem) return null;
  var pv=valuation(player(state)), gap=valuation(nem)-pv, behind=gap>0;
  var left=CONFIG.turns-(y+1);
  var leftTxt = left<=0 ? "final year" : (left+(left===1?" year left":" years left"));
  var prev=App.prevNem, sameNem=prev&&prev.id===nem.id, passed=sameNem&&(prev.behind!==behind);
  var gapNode=el("b",{text:fmtMoney(Math.abs(gap))});
  if(App.freshView && sameNem) animateCount(gapNode, Math.abs(prev.gap), Math.abs(gap), 600, fmtMoney);
  App.prevNem={id:nem.id, gap:gap, behind:behind};
  var banner=el("div",{class:"nemesis "+(behind?"behind":"ahead")+(passed&&App.freshView?" shake":"")},[
    el("span",{class:"ne-ic",text:behind?"▼":"▲"}),
    el("span",{class:"ne-txt"},[ (behind?"Chasing ":"Holding off "), el("b",{text:nem.name}), " "+nem.flag+" — ", gapNode, (behind?" behind":" ahead") ]),
    el("span",{class:"ne-left",text:leftTxt}),
  ]);
  if(passed && App.freshView) banner.appendChild(el("div",{class:"ne-callout "+(behind?"bad":"good"),text:(behind?("⚑ "+nem.name+" just passed you"):("⚑ You passed "+nem.name))}));
  return banner;
}
function standingsTicker(state){
  var r=state.lastRank||playerRank(state), mv=state.rankMove||0;
  var word = mv>0 ? "▲ Climbed to" : mv<0 ? "▼ Slipped to" : "Holding";

}

function capitalRemaining(){
  var s=App.state, p=player(s), spent=0;
  SEG_IDS.forEach(function(seg){ spent += (s.planned[seg]||0)*CONFIG.capacityCostPerUnit; });
  return p.cash - spent;
}

function turnView(){
  var s=App.state, p=player(s), y=s.yearIndex;

  var wrap=el("div",{},[]);

  if(p.budgetStreak>=2) wrap.appendChild(el("div",{class:"beat bad"},[ el("span",{class:"beat-ic",text:"⚠️"}),
    "You've run Budget "+p.budgetStreak+" years straight — corners are being cut, and recall risk is climbing." ]));

  // 3. the board: a coloured battlefield row per segment + inline allocation

  SEGMENTS.forEach(function(seg){
    var evMult=eventMultiplier(s.scenario.events[y],s.scenario.severities[y],seg.id);
    var drift = seg.id==="ev" ? (1+y*CONFIG.secularDriftEV) : 1;
    var mult = evMult*drift*(s.pending[seg.id]||1);
    var arr=loudArrow(mult);   // louder demand read: 1 chevron for a nudge, 2 for a real swing

    // current share estimate (uses current capacities before this year's resolve)
    var sumEff=0; s.entities.forEach(function(e){ sumEff+=effectiveCapacity(e,seg.id); });
    var yourShare = sumEff>0 ? effectiveCapacity(p,seg.id)/sumEff : 0;

    // rivals present
    var chips=[];
    s.entities.forEach(function(e){ if(!e.isPlayer && (e.capacity[seg.id]||0) >= 3) chips.push(el("span",{class:"chip",text:e.short})); });
    if(!chips.length) chips.push(el("span",{class:"chip open",text:"open"}));

    var planned=s.planned[seg.id]||0;
    var cost=planned*CONFIG.capacityCostPerUnit;
    var canAdd = capitalRemaining() >= CONFIG.allocStepUnits*CONFIG.capacityCostPerUnit;

    // battlefield read: who owns this turf + the live threat level (mirrors resolveYear's triggers)
    var owner=rivalMeta(seg.defender);
    var dominate = yourShare > CONFIG.dominanceThreshold;
    var alarm = planned > CONFIG.rivalAlarmBuildUnits;
    var threat = dominate ? {cls:"war",label:"Price-war risk"} : alarm ? {cls:"watch",label:"Watchlist"} : {cls:"low",label:"Low"};

        ]),

    ]));
  });
  wrap.appendChild(list);

  // 6. company-wide posture
  var posWrap=el("div",{class:"posture"},[ el("div",{class:"seclbl",text:"Company posture this year"}) ]);
  var seg3=el("div",{class:"seg3"});

  posWrap.appendChild(seg3);
  wrap.appendChild(posWrap);

  // pending price-war warnings that land THIS year (so the squeeze is never silent)
  var liveWarns=[];
  SEG_IDS.forEach(function(seg){ if((s.pending[seg]||1) < 1) liveWarns.push(segMeta(seg)); });
  if(liveWarns.length){

  App.prevBudget=rem;

  wrap.appendChild(el("div",{class:"runbar"},[
    el("div",{class:"capreadout"},[
      el("span",{class:"muted",text:"Investment budget"}),
      el("span",{class:"big "+(rem<0?"red":"accent")},[ remNode, " of "+fmtMoney(p.cash)+" left" ]),
    ]),
    el("button",{class:"btn primary "+glowCls,text:"Run the model year ▸",onclick:launchYear}),
  ]));

  return wrap;
}

function stepAlloc(segId,dir){
  var s=App.state;
  var cur=s.planned[segId]||0, changed=false;
  if(dir>0){
    if(capitalRemaining() < CONFIG.allocStepUnits*CONFIG.capacityCostPerUnit) return;
    s.planned[segId]=cur+CONFIG.allocStepUnits; changed=true;
  } else if(cur>0){
    s.planned[segId]=Math.max(0,cur-CONFIG.allocStepUnits); changed=true;
  }
  if(changed) floatChip(segId,dir);
  render();
}
// a small "+N" chip that floats up from the tapped stepper (on body, survives the re-render)
function floatChip(segId,dir){
  if(reduced()) return;
  var name=segMeta(segId).name;
  var btn=document.querySelector('[aria-label="'+(dir>0?"Add capacity to ":"Remove capacity from ")+name+'"]');
  if(!btn) return;
  var r=btn.getBoundingClientRect();
  var chip=el("div",{class:"floatchip",text:(dir>0?"+":"−")+CONFIG.allocStepUnits});
  chip.style.left=(r.left+r.width/2-10+window.scrollX)+"px";
  chip.style.top=(r.top-4+window.scrollY)+"px";
  document.body.appendChild(chip);
  setTimeout(function(){ if(chip.parentNode) chip.parentNode.removeChild(chip); }, 760);
}

// The launch ceremony: a brief green-flag wipe across the action bar, then the result
// reveals. Skippable with a tap. Reduced-motion goes straight to the result.
function launchYear(ev){
  var btn=ev&&ev.currentTarget;
  if(reduced()){ runYear(); return; }
  var bar=document.querySelector(".runbar");
  if(btn) btn.classList.add("depress");
  if(bar) bar.appendChild(el("div",{class:"launch-wipe"}));
  var done=false, timer=null, skip=null;
  function go(){ if(done) return; done=true; if(timer) clearTimeout(timer); if(skip) document.removeEventListener("pointerdown",skip,true); runYear(); }
  timer=setTimeout(go, 660);
  skip=function(){ go(); };
  setTimeout(function(){ if(!done) document.addEventListener("pointerdown",skip,true); }, 120);  // arm after the triggering tap
}
function runYear(){
  var s=App.state, p=player(s);
  // commit the player's build: it opens NEXT year (delayed capacity). Pay for it now.
  SEG_IDS.forEach(function(seg){
    var u=s.planned[seg]||0;
    p.pendingCap[seg]=u;
    if(u>0){ p.cash -= u*CONFIG.capacityCostPerUnit; }
  });
  p.posture=s.playerPosture;
  // a launch = the segment that got this year's largest build; cosmetic, derived from s.planned (UI only)
  var launch=primaryLaunch(s, s.planned, s.yearIndex);
  s._lastLaunch=launch;
  if(launch) s.launches.push(launch);
  var res=resolveYear(s);
  s.lastResult=res;
  s.valHistory.push(valuation(p));                                         // sparkline point (UI only; headless ignores valHistory)
  if(res.personal && res.personal.type==="recall") App.recallFlash=true;   // a recall flashes the scoreboard red next turn
  if(s.yearIndex >= CONFIG.turns-1){ activatePending(s); s.phase="end"; }  // final builds count as asset value
  else s.phase="result";
  App.freshView=true;
  render();
  window.scrollTo(0,0);
}

function resultView(){
  var s=App.state, res=s.lastResult, y=s.yearIndex;
  var profit=res.profit;
  var wrap=el("div",{class:"result"},[]);

  // launch reveal — the Two Seats "card" beat: the car you just launched rises in as a studio card

    wrap.appendChild(el("div",{class:"launchcard"+(App.freshView?" car-rise":""),style:"--seg:"+launch.livery+";--seg-tint:"+lseg.tint},[
      el("div",{class:"lc-k",text:"New for model year "+(y+1)+" · "+lseg.name}),

      el("div",{class:"lc-specs"}, launch.specs.map(function(sp){ return el("span",{class:"lc-spec",text:sp}); })),
    ]));
  }

  var late = y>=CONFIG.turns-3;   // closing years: snappier, more aggressive count-up
  var heroV=el("div",{class:"heroV "+(profit>=0?"green":"red"),text:fmtSigned(0)});
  animateCount(heroV, 0, profit, late?420:650, fmtSigned);   // the year's profit/loss counts up
  wrap.appendChild(el("div",{class:"hero"},[
    el("div",{class:"heroK",text:"Model year "+(y+1)+" result"}),
    heroV,
    el("div",{class:"heroSub",text:profit>=0?"Profit on the year.":"Loss on the year."}),
  ]));

  var notes=el("div",{class:"notes"});

  // personal event (recall / viral) — the most dramatic beat, lead with it
  if(res.personal && res.personal.type==="recall"){
    notes.appendChild(el("div",{class:"note warn"+(App.freshView?" shake":"")},[ el("span",{class:"nh",text:"Recall"}),
      "Cutting corners caught up with you — a recall hammers your brand and costs "+fmtMoney(Math.abs(res.personal.cashDelta))+". Quality isn't free." ]));
  } else if(res.personal && res.personal.type==="viral"){
    notes.appendChild(el("div",{class:"note good"},[ el("span",{class:"nh",text:"Breakout"}),
      "One of your cars goes viral — the badge is suddenly everywhere and your brand spikes." ]));
  }

  // best / worst segment this year (computed, never faked) — written as business headlines
  var best=null,worst=null;
  SEG_IDS.forEach(function(seg){
    var sp=res.segProfit[seg]; if(!sp) return;
    if(sp.capacity<=0) return;
    if(best===null || sp.profit>res.segProfit[best].profit) best=seg;
    if(worst===null || sp.profit<res.segProfit[worst].profit) worst=seg;
  });
  if(best!==null && res.segProfit[best].profit>0){
    var bm=segMeta(best), bp=res.segProfit[best];
    var bmult=eventMultiplier(s.scenario.events[y],s.scenario.severities[y],best);
    var bhead, bbody;
    if(best==="ev" && bmult>1.2){ bhead="EV bet pays"; bbody="Your EV bet opened a year early — "+pct(bp.share)+" of the pool and "+fmtSigned(bp.profit)+"."; }
    else { bhead="Sold out"; bbody="Dealers can't keep your "+bm.name+" on the lot — "+pct(bp.share)+" of the pool, "+fmtSigned(bp.profit)+"."; }
    notes.appendChild(el("div",{class:"note good"},[ el("span",{class:"nh",text:bhead}), bm.emoji+" "+bbody ]));
  }
  if(worst!==null && worst!==best && res.segProfit[worst].profit<0){
    var wm=segMeta(worst), wp=res.segProfit[worst];
    notes.appendChild(el("div",{class:"note warn"},[
      el("span",{class:"nh",text:"Dead steel"}),
      wm.emoji+" "+wm.name+" is dead steel on the balance sheet — it bled "+fmtMoney(wp.profit)+" against running costs.",
    ]));
  }

  // sacred mechanic 2 — the telegraphed warning for NEXT year
  res.warnings.forEach(function(w){
    notes.appendChild(el("div",{class:"note rival"},[
      el("span",{class:"nh",text:"Incoming"}),

  });
  if(!res.warnings.length){
    notes.appendChild(el("div",{class:"note rival"},[
      el("span",{class:"nh",text:"The field"}),
      "No rival felt threatened enough to start a price war. You stayed under the radar.",
    ]));
  }

  wrap.appendChild(notes);
  wrap.appendChild(el("div",{class:"actions"},[
    el("button",{class:"btn primary",text:"Next model year ▸",onclick:nextYear}),
  ]));
  return wrap;
}

// Enter a model year: record rank movement for the standings ticker, then render.
function beginTurn(){
  var s=App.state, r=playerRank(s);
  s.rankMove = (s.lastRank==null) ? 0 : (s.lastRank - r);   // +ve = climbed
  s.lastRank = r;
  s.phase="turn";
  App.freshView=true; App.prevBudget=null;   // budget resets to full at the start of a year
  render();
  window.scrollTo(0,0);
}
function nextYear(){
  var s=App.state;
  s.yearIndex++;
  s.planned={};
  activatePending(s);   // last year's builds (yours and the rivals') come online now
  beginTurn();
}

/* ============================ end screen (staged finale reveal) ============================ */
function prefersReducedMotion(){ return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; }

function endView(){
  var s=App.state, p=player(s);
  var rank=playerRank(s), bd=valuationBreakdown(p);
  var grade=gradeFor(rank,bd.total,s.entities.length);
  var ranked=rankings(s), pv=bd.total;
  var nem=nemesisFor(s), nv=nem?valuation(nem):0, ahead=bd.total>=nv;
  var headline = rank===1 ? "🏆 You won the decade outright."
    : ahead ? ("🏁 You held off "+nem.name+" by "+fmtMoney(bd.total-nv)+".")
            : ("So close — "+nem.name+" edged you by "+fmtMoney(nv-bd.total)+".");
  var story=storyBeat(s);
