// Derive a one-line story from the history: best cumulative segment + worst single decision.
function storyBeat(state){
  var cum={}; SEG_IDS.forEach(function(s){ cum[s]=0; });
  var worst=null;
  state.history.forEach(function(h){
    SEG_IDS.forEach(function(s){
      cum[s]+=h.seg[s].profit;
      // "worst decision" = the year you put the most money into the segment that lost the most
      if(h.seg[s].alloc>0 && h.seg[s].profit<0){
        var score=h.seg[s].profit; // most negative
        if(worst===null||score<worst.score) worst={score:score,seg:s,year:h.year};
      }
    });
  });
  var bestSeg=SEG_IDS[0]; SEG_IDS.forEach(function(s){ if(cum[s]>cum[bestSeg]) bestSeg=s; });
  var line = "Your money machine was "+segMeta(bestSeg).name+" ("+fmtSigned(Math.round(cum[bestSeg]))+" over the decade). ";
  if(worst){
    line += "Your worst call was pouring capital into "+segMeta(worst.seg).name+" in year "+(worst.year+1)+" — it lost "+fmtMoney(Math.abs(worst.score))+".";
  } else {
    line += "You never made a losing bet on a segment you invested in. Clean sheet.";
  }
  return line;
}

/* ============================ headless sim + bots (balance check) ============================ */
// Run a full 10-year game under a fixed allocation policy. policy(state,year) ->
// { alloc:{seg:units}, posture }. Returns the player's final valuation.
function runHeadless(seed,policy){
  var st=createState(seed); st.phase="turn";
  for(var y=0;y<CONFIG.turns;y++){
    activatePending(st);                 // last year's builds (yours + rivals') come online
    var p=player(st);
    var dec=policy(st,y)||{alloc:{},posture:"standard"};
    st.planned={};
    SEG_IDS.forEach(function(seg){ p.pendingCap[seg]=0; });
    SEG_IDS.forEach(function(seg){
      var u=(dec.alloc&&dec.alloc[seg])||0;
      u=Math.min(u, Math.floor(Math.max(0,p.cash)/CONFIG.capacityCostPerUnit)); // affordability clamp
      if(u>0){ st.planned[seg]=u; p.pendingCap[seg]=u; p.cash-=u*CONFIG.capacityCostPerUnit; }  // delayed build
    });
    p.posture=dec.posture||"standard";
    resolveYear(st);
    st.yearIndex++;
  }
  activatePending(st);                    // final builds count as asset value
  return { valuation:valuation(player(st)), rank:playerRankFinal(st) };
}
function playerRankFinal(st){
  var r=st.entities.map(function(e){return {e:e,v:valuation(e)};}).sort(function(a,b){return b.v-a.v;});
  for(var i=0;i<r.length;i++) if(r[i].e.isPlayer) return i+1; return r.length;
}
// Capacity bets pay back over years, so the sane policies build hard early and
// taper to harvest. This weight is the fraction of CURRENT cash spent in year y.
function buildWeight(y){ return Math.max(0, 0.55 - y*0.07); }
function allocInto(state,segs,frac){
  var p=player(state), budget=Math.max(0,p.cash)*frac, per=budget/segs.length, alloc={};
  segs.forEach(function(s){
    var units=Math.floor((per/CONFIG.capacityCostPerUnit)/CONFIG.allocStepUnits)*CONFIG.allocStepUnits;
    units=Math.min(units, CONFIG.botMaxUnitsPerSeg);   // don't dump a whole pool's worth in one year
    if(units>0) alloc[s]=units;
  });
  return alloc;
}
// Score a segment for an arbitrary event/severity (used to score either THIS year
// or — for forecast-followers — what NEXT year is forecast to look like). Because
// capacity now opens a year late, a smart bot scores the FORECAST, not the headline.
function scoreFor(st,yProduce,s,eventId,sev){
  var m=eventMultiplier(eventId,sev,s)*(s==="ev"?(1+yProduce*CONFIG.secularDriftEV):1);
  var sumEff=0; st.entities.forEach(function(e){sumEff+=effectiveCapacity(e,s);});
  var share=sumEff>0?effectiveCapacity(player(st),s)/sumEff:0;
  var poolish=segMeta(s).basePool*CONFIG.poolUnit*m;
  var crowd=sumEff>0?poolish/sumEff:poolish;        // revenue available per unit of effective capacity
  return { s:s, score:m*(1+segMeta(s).baseMargin)*crowd*(share<CONFIG.dominanceThreshold?1:0.5), share:share, mult:m };
}
function segScoreThisYear(st,y,s){ return scoreFor(st,y,s,st.scenario.events[y],st.scenario.severities[y]); }
function segScoreForecast(st,y,s){
  if(y>=CONFIG.turns-1) return { s:s, score:0, mult:1 };
  return scoreFor(st,y+1,s,st.scenario.forecastEvent[y],"medium");   // bet on next year's forecast at medium severity
}
function topTwo(scored){ scored=scored.slice().sort(function(a,b){return b.score-a.score;}); return [scored[0].s,scored[1].s]; }
function topOne(scored){ return scored.slice().sort(function(a,b){return b.score-a.score;})[0].s; }
// Aggressive single-segment build (used by the believer bots). It deliberately pours in
// past the watchlist alarm, so a wrong bet really hurts — that is the risk that lets the
// steady bots win on seeds where the forecast misfires.
function allocConcentrated(state,seg,frac,cap){
  var p=player(state), budget=Math.max(0,p.cash)*frac;
  var units=Math.floor((budget/CONFIG.capacityCostPerUnit)/CONFIG.allocStepUnits)*CONFIG.allocStepUnits;
  units=Math.min(units, cap||50);
  var a={}; if(units>0) a[seg]=units; return a;
}
function postureForSegs(segs){ return (segs.indexOf("luxury")>=0||segs.indexOf("performance")>=0||segs.indexOf("ev")>=0)?"premium":"standard"; }
// A committed specialist: build and SUSTAIN one lane every year (sub-alarm builds, so it
// isn't auto-punished), riding it. Wins on the seeds whose era favors that lane, loses on
// the rest — exactly the "wins on the days that favor it" behaviour the spec wants.
function laneBot(lane, posture){
  return function(st,y){
    if(y>=CONFIG.turns-1) return { alloc:{}, posture:posture };
    return { alloc:allocInto(st,lane,buildWeight(y)), posture:posture };
  };
}
var BOTS = {
  hoard:       function(st,y){ return { alloc:{}, posture:"standard" }; },
  evenSpread:  function(st,y){ return { alloc:allocInto(st,SEG_IDS,0.30), posture:"standard" }; },   // the bogey
  premiumSpread:function(st,y){ return { alloc:allocInto(st,["luxury","ev","performance","pickup"],0.34), posture:"premium" }; },  // diversified, margin-tilted — wins premium/EV/boom eras
  valueSpread: function(st,y){ return { alloc:allocInto(st,["economy","family","pickup"],0.34), posture:"standard" }; },           // diversified, volume-tilted — wins recession/SUV eras
  truckTitan:  laneBot(["pickup"],  "standard"),  // wins on cheap-gas / boom eras
  evVisionary: laneBot(["ev"],      "premium"),   // wins on EV-subsidy eras + the late EV transition
  luxBaron:    laneBot(["luxury"],  "premium"),   // wins on boom / luxury eras
  familyVolume:laneBot(["family"],  "standard"),  // wins on SUV-craze eras
  economyKing: laneBot(["economy"], "standard"),  // wins on recession eras (when everything else craters)
  // contrarian: commits hard into the COLDEST decent segment this year, betting demand
  // swings back by the time the capacity opens. Wins the seeds where the crowd (and the
  // believers) pile into the wrong thing.
  contrarian:  function(st,y){
    if(y>=CONFIG.turns-1) return { alloc:{}, posture:"standard" };
    var ranked=SEG_IDS.map(function(s){ return segScoreThisYear(st,y,s); }).filter(function(o){return segMeta(o.s).baseMargin>=0.18;})
      .sort(function(a,b){return a.mult-b.mult;});   // coldest first
    var top=ranked[0].s;
    return { alloc:allocConcentrated(st,top,CONFIG.believerFrac,CONFIG.believerCap), posture:postureForSegs([top]) };
  },
  // eraReader: reads the DECADE's character from the events seen so far and commits early
  // to the segment its dominant event favours, compounding first-mover share. Wins the
  // strong-era seeds (a clear truck/EV/recession decade) that the 1-year readers miss.
  eraReader:   function(st,y){
    if(y>=CONFIG.turns-1) return { alloc:{}, posture:"standard" };
    var counts={}; for(var i=0;i<=y;i++){ var e=st.scenario.events[i]; counts[e]=(counts[e]||0)+1; }
    var dom=null,mx=0; for(var k in counts){ if(k!=="quiet"&&counts[k]>mx){mx=counts[k];dom=k;} }
    if(!dom) dom=st.scenario.events[y];
    var best=null,bm=-1; SEG_IDS.forEach(function(s){ var m=eventMultiplier(dom,"medium",s)*(s==="ev"?(1+(y+1)*CONFIG.secularDriftEV):1); if(m>bm){bm=m;best=s;} });
    return { alloc:allocConcentrated(st,best,CONFIG.believerFrac,CONFIG.believerCap), posture:postureForSegs([best]) };
  },
  // reactiveLate: pours hard into THIS year's hottest segment — but capacity opens a year
  // late, so it is betting that next year looks like this year. Usually it doesn't.
  reactiveLate:function(st,y){
    if(y>=CONFIG.turns-1) return { alloc:{}, posture:"standard" };
    var top=topOne(SEG_IDS.map(function(s){ return segScoreThisYear(st,y,s); }));
    return { alloc:allocConcentrated(st,top,CONFIG.believerFrac,CONFIG.believerCap), posture:postureForSegs([top]) };
  },
  // adaptive: a forecast BELIEVER — commits hard into the single segment next year's
  // forecast favours. Right ~70% of the time (forecasts are seed-fixed, 30% red herrings),
  // so on seeds with several false forecasts it craters and a steady bot wins the day.
  adaptive:    function(st,y){
    if(y>=CONFIG.turns-1) return { alloc:{}, posture:"standard" };
    var top=topOne(SEG_IDS.map(function(s){ return segScoreForecast(st,y,s); }));
    return { alloc:allocConcentrated(st,top,CONFIG.believerFrac,CONFIG.believerCap), posture:postureForSegs([top]) };
  },
};
function balanceCheck(nSeeds){
  nSeeds=nSeeds||120;
  var names=Object.keys(BOTS), wins={}, sum={};
  names.forEach(function(n){wins[n]=0;sum[n]=0;});
  for(var i=0;i<nSeeds;i++){
    var seed="balance|"+i, best=-Infinity, bestBot=null, vals={};
    names.forEach(function(n){ var r=runHeadless(seed,BOTS[n]); vals[n]=r.valuation; sum[n]+=r.valuation; if(r.valuation>best){best=r.valuation;bestBot=n;} });
    wins[bestBot]++;
  }
  return names.map(function(n){ return { bot:n, winRate:wins[n]/nSeeds, avg:sum[n]/nSeeds }; })
    .sort(function(a,b){return b.winRate-a.winRate;});
}

// Par for one seed: run every bot on the same scenario the player faced, so the player
// can see where their valuation lands. Bogey = even-spread floor, par = 65th percentile,
// top10 = the elite line. Cheap (a dozen 10-year sims).
function computePar(seed){
  var names=Object.keys(BOTS);
  var vals=names.map(function(n){ return runHeadless(seed,BOTS[n]).valuation; });
  var sorted=vals.slice().sort(function(a,b){return a-b;});
  function pctile(p){ return sorted[clamp(Math.round(p*(sorted.length-1)),0,sorted.length-1)]; }
  return { bogey:runHeadless(seed,BOTS.evenSpread).valuation, par:pctile(0.65), top10:pctile(0.90), vals:vals, n:names.length };
}

// Section 3 build order: verify contested-share math by hand against a known input.
function selfTest(){
  // Two entities in one segment. Pool 1000. A has 60 eff cap, B has 40. No posture/brand effects.
  // A share = 60/100 = 0.6, gross = 600. margin 0.2 => 120. opCost 60*1 => 60. profit = 60.
  var pool=1000, effA=60, effB=40, shareA=effA/(effA+effB), gross=shareA*pool, margin=0.2, opCost=60;
  var profit=gross*margin-opCost;
  var ok = Math.abs(shareA-0.6)<1e-9 && Math.abs(gross-600)<1e-9 && Math.abs(profit-60)<1e-9;
  return "Contested-share self-test: share="+shareA.toFixed(3)+" gross="+gross+" profit="+profit+"  => "+(ok?"PASS":"FAIL");
}

/* ============================ boot ============================ */
App.root=document.getElementById("app");
setSeed(todaySeed(), false);   // default to today's official daily, identical for everyone
render();
// expose for measurement in the preview (no node runtime here)
window.__MODELYEAR__ = { runHeadless:runHeadless, balanceCheck:balanceCheck, computePar:computePar, BOTS:BOTS, createState:createState, resolveYear:resolveYear, activatePending:activatePending, valuation:valuation, CONFIG:CONFIG, selfTest:selfTest };
})();
</script>
